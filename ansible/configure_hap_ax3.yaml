---
- name: Configure MikroTik hAP ax3
  hosts: localhost
  gather_facts: false
  become: false
  vars_files:
    - group_vars/all/hap_ax3.yaml

  module_defaults:
    group/community.routeros.api:
      hostname: "{{ hap_ax3_host }}"
      username: "{{ hap_ax3_username }}"
      password: "{{ hap_ax3_password }}"
      tls: false

  tasks:
    # -------------------------
    # Identity
    # -------------------------
    - name: Set identity
      community.routeros.api:
        path: system identity
        cmd: "set name=hap-ax3"

    # -------------------------
    # Bridge ports
    # -------------------------
    - name: Set ether2 as trunk to SG108E
      community.routeros.api_find_and_modify:
        path: interface bridge port
        find:
          interface: ether2
        values:
          pvid: "1"
          frame-types: admit-all

    - name: Set ether3 as access port VLAN 40 desktop
      community.routeros.api_find_and_modify:
        path: interface bridge port
        find:
          interface: ether3
        values:
          pvid: "40"
          frame-types: admit-only-untagged-and-priority-tagged

    - name: Set ether4 as access port VLAN 50
      community.routeros.api_find_and_modify:
        path: interface bridge port
        find:
          interface: ether4
        values:
          pvid: "50"
          frame-types: admit-only-untagged-and-priority-tagged

    - name: Set ether5 as access port VLAN 50
      community.routeros.api_find_and_modify:
        path: interface bridge port
        find:
          interface: ether5
        values:
          pvid: "50"
          frame-types: admit-only-untagged-and-priority-tagged

    - name: Set wifi1 bridge port to VLAN 50
      community.routeros.api_find_and_modify:
        path: interface bridge port
        find:
          interface: wifi1
        values:
          pvid: "50"
          frame-types: admit-only-untagged-and-priority-tagged

    - name: Set wifi2 bridge port to VLAN 50
      community.routeros.api_find_and_modify:
        path: interface bridge port
        find:
          interface: wifi2
        values:
          pvid: "50"
          frame-types: admit-only-untagged-and-priority-tagged

    # -------------------------
    # Cleanup - DHCP
    # -------------------------
    - name: Gather DHCP servers
      community.routeros.api:
        path: ip dhcp-server
        cmd: "print"
      register: dhcp_cleanup

    - name: Remove defconf DHCP server
      community.routeros.api:
        path: ip dhcp-server
        remove: "{{ item['.id'] }}"
      loop: "{{ dhcp_cleanup.msg | selectattr('name', 'equalto', 'defconf') | list }}"
      ignore_errors: true

    # -------------------------
    # Cleanup - duplicate firewall rules
    # -------------------------
    - name: Gather existing firewall rules
      community.routeros.api:
        path: ip firewall filter
        cmd: "print"
      register: fw_cleanup

    - name: Clean duplicate firewall rules
      community.routeros.api:
        path: ip firewall filter
        remove: "{{ item['.id'] }}"
      loop: "{{ fw_cleanup.msg | selectattr('comment', 'defined') | selectattr('comment', 'search', 'allow-established|desktop-to-proxmox|desktop-to-talos|proxmox-to-talos|allow-to-internet|drop-wifi-to-internal|drop-talos-to-mgmt|drop-cluster-outbound|drop-wifi-router-mgmt') | list }}"
      ignore_errors: true

    # -------------------------
    # Cleanup - duplicate NAT rules
    # -------------------------
    - name: Gather NAT rules
      community.routeros.api:
        path: ip firewall nat
        cmd: "print"
      register: nat_cleanup

    - name: Remove duplicate masquerade rules
      community.routeros.api:
        path: ip firewall nat
        remove: "{{ item['.id'] }}"
      loop: "{{ nat_cleanup.msg | selectattr('comment', 'defined') | selectattr('comment', 'equalto', 'masquerade-to-wan') | list }}"
      ignore_errors: true

    # -------------------------
    # Bridge VLAN membership
    # Remove all VLAN 50 entries first (dynamic ones cant be modified)
    # then add static ones
    # -------------------------
    - name: Gather all bridge VLAN entries
      community.routeros.api:
        path: interface bridge vlan
        cmd: "print"
      register: bridge_vlans

    - name: Remove all VLAN 50 entries
      community.routeros.api:
        path: interface bridge vlan
        remove: "{{ item['.id'] }}"
      loop: "{{ bridge_vlans.msg | selectattr('vlan-ids', 'equalto', '50') | list }}"
      ignore_errors: true

    - name: Add VLAN 88 to bridge
      community.routeros.api:
        path: interface bridge vlan
        cmd: "add bridge=bridge vlan-ids=88 tagged=bridge untagged=ether2,ether3,ether4,ether5"
      ignore_errors: true

    - name: Add VLAN 10 to bridge
      community.routeros.api:
        path: interface bridge vlan
        cmd: "add bridge=bridge vlan-ids=10 tagged=bridge,ether2"
      ignore_errors: true

    - name: Add VLAN 20 to bridge
      community.routeros.api:
        path: interface bridge vlan
        cmd: "add bridge=bridge vlan-ids=20 tagged=bridge,ether2"
      ignore_errors: true

    - name: Add VLAN 30 to bridge
      community.routeros.api:
        path: interface bridge vlan
        cmd: "add bridge=bridge vlan-ids=30 tagged=bridge,ether2"
      ignore_errors: true

    - name: Add VLAN 40 to bridge
      community.routeros.api:
        path: interface bridge vlan
        cmd: "add bridge=bridge vlan-ids=40 tagged=bridge,ether2 untagged=ether3"
      ignore_errors: true

    - name: Add VLAN 50 to bridge
      community.routeros.api:
        path: interface bridge vlan
        cmd: "add bridge=bridge vlan-ids=50 tagged=bridge,ether2 untagged=ether4,ether5,wifi1,wifi2"
      ignore_errors: true

    # -------------------------
    # VLAN interfaces
    # -------------------------
    - name: Add VLAN {{ vlan.id }} interface
      community.routeros.api:
        path: interface vlan
        cmd: "add name=vlan{{ vlan.id }} vlan-id={{ vlan.id }} interface=bridge comment={{ vlan.name }}"
      loop: "{{ vlans }}"
      loop_control:
        loop_var: vlan
      ignore_errors: true

    # -------------------------
    # IP addresses
    # -------------------------
    - name: Set IP on VLAN {{ vlan.id }} {{ vlan.name }}
      community.routeros.api:
        path: ip address
        cmd: "add address={{ vlan.gateway }}/24 interface=vlan{{ vlan.id }} comment={{ vlan.name }}"
      loop: "{{ vlans }}"
      loop_control:
        loop_var: vlan
      ignore_errors: true

    # -------------------------
    # DHCP pools
    # -------------------------
    - name: Add DHCP pool for VLAN {{ vlan.id }}
      community.routeros.api:
        path: ip pool
        cmd: "add name=dhcp-vlan{{ vlan.id }} ranges={{ vlan.dhcp_pool_start }}-{{ vlan.dhcp_pool_end }}"
      loop: "{{ vlans }}"
      loop_control:
        loop_var: vlan
      when: vlan.dhcp
      ignore_errors: true

    # -------------------------
    # DHCP servers
    # -------------------------
    - name: Add DHCP server for VLAN {{ vlan.id }}
      community.routeros.api:
        path: ip dhcp-server
        cmd: "add name=dhcp-vlan{{ vlan.id }} interface=vlan{{ vlan.id }} address-pool=dhcp-vlan{{ vlan.id }} disabled=no"
      loop: "{{ vlans }}"
      loop_control:
        loop_var: vlan
      when: vlan.dhcp
      ignore_errors: true

    - name: Add DHCP network for VLAN {{ vlan.id }}
      community.routeros.api:
        path: ip dhcp-server network
        cmd: "add address={{ vlan.subnet }} gateway={{ vlan.gateway }} dns-server={{ vlan.gateway }} comment={{ vlan.name }}"
      loop: "{{ vlans }}"
      loop_control:
        loop_var: vlan
      when: vlan.dhcp
      ignore_errors: true

    # -------------------------
    # NAT
    # -------------------------
    - name: Add masquerade rule
      community.routeros.api:
        path: ip firewall nat
        cmd: "add chain=srcnat out-interface=ether1 action=masquerade comment=masquerade-to-wan"
      ignore_errors: true

    # -------------------------
    # Interface list members
    # -------------------------
    - name: Add vlan{{ vlan.id }} to LAN interface list
      community.routeros.api:
        path: interface list member
        cmd: "add interface=vlan{{ vlan.id }} list=LAN comment={{ vlan.name }}"
      loop: "{{ vlans }}"
      loop_control:
        loop_var: vlan
      ignore_errors: true

    # -------------------------
    # Firewall forward rules
    # -------------------------
    - name: Allow established and related
      community.routeros.api:
        path: ip firewall filter
        cmd: "add chain=forward connection-state=established,related action=accept comment=allow-established"
      ignore_errors: true

    - name: Allow desktop to Proxmox
      community.routeros.api:
        path: ip firewall filter
        cmd: "add chain=forward src-address=192.168.40.0/24 dst-address=192.168.10.0/24 action=accept comment=desktop-to-proxmox"
      ignore_errors: true

    - name: Allow desktop to Talos
      community.routeros.api:
        path: ip firewall filter
        cmd: "add chain=forward src-address=192.168.40.0/24 dst-address=192.168.30.0/24 action=accept comment=desktop-to-talos"
      ignore_errors: true

    - name: Allow Proxmox to Talos
      community.routeros.api:
        path: ip firewall filter
        cmd: "add chain=forward src-address=192.168.10.0/24 dst-address=192.168.30.0/24 action=accept comment=proxmox-to-talos"
      ignore_errors: true

    - name: Allow all VLANs to internet
      community.routeros.api:
        path: ip firewall filter
        cmd: "add chain=forward out-interface=ether1 action=accept comment=allow-to-internet"
      ignore_errors: true

    - name: Drop WiFi to internal VLANs
      community.routeros.api:
        path: ip firewall filter
        cmd: "add chain=forward src-address=192.168.50.0/24 dst-address=192.168.0.0/16 action=drop comment=drop-wifi-to-internal"
      ignore_errors: true

    - name: Drop Talos to management
      community.routeros.api:
        path: ip firewall filter
        cmd: "add chain=forward src-address=192.168.30.0/24 dst-address=192.168.10.0/24 action=drop comment=drop-talos-to-mgmt"
      ignore_errors: true

    - name: Drop cluster VLAN outbound
      community.routeros.api:
        path: ip firewall filter
        cmd: "add chain=forward src-address=192.168.20.0/24 action=drop comment=drop-cluster-outbound"
      ignore_errors: true

    # -------------------------
    # Firewall input rules
    # -------------------------
    - name: Drop WiFi access to router management ports only
      community.routeros.api:
        path: ip firewall filter
        cmd: "add chain=input src-address=192.168.50.0/24 dst-port=22,80,8291,8728,8729 protocol=tcp action=drop comment=drop-wifi-router-mgmt"
      ignore_errors: true

    # -------------------------
    # WiFi SSID and security
    # -------------------------
    - name: Configure wifi1 5GHz
      community.routeros.api_find_and_modify:
        path: interface wifi
        find:
          default-name: wifi1
        values:
          configuration.ssid: "{{ wifi_ssid }}"
          configuration.mode: ap
          security.authentication-types: wpa2-psk,wpa3-psk
          security.passphrase: "{{ wifi_password }}"
          disabled: "no"

    - name: Configure wifi2 2.4GHz
      community.routeros.api_find_and_modify:
        path: interface wifi
        find:
          default-name: wifi2
        values:
          configuration.ssid: "{{ wifi_ssid }}"
          configuration.mode: ap
          security.authentication-types: wpa2-psk,wpa3-psk
          security.passphrase: "{{ wifi_password }}"
          disabled: "no"

    # -------------------------
    # Enable VLAN filtering LAST
    # -------------------------
    - name: Enable bridge VLAN filtering
      community.routeros.api_find_and_modify:
        path: interface bridge
        find:
          name: bridge
        values:
          vlan-filtering: "yes"
          pvid: "10"

    # -------------------------
    # Disable default 192.168.88.1 LAST
    # -------------------------
    - name: Disable default 192.168.88.1 address
      community.routeros.api_find_and_modify:
        path: ip address
        find:
          address: 192.168.88.1/24
        values:
          disabled: "yes"

  post_tasks:
    - name: Verify VLAN interfaces
      community.routeros.api:
        path: interface vlan
        cmd: "print"
      register: vlan_result

    - name: Show VLANs
      debug:
        var: vlan_result

    - name: Verify DHCP servers
      community.routeros.api:
        path: ip dhcp-server
        cmd: "print"
      register: dhcp_result

    - name: Show DHCP servers
      debug:
        var: dhcp_result

    - name: Verify firewall rules
      community.routeros.api:
        path: ip firewall filter
        cmd: "print"
      register: fw_result

    - name: Show firewall rules
      debug:
        var: fw_result

    - name: Verify interface list members
      community.routeros.api:
        path: interface list member
        cmd: "print"
      register: list_members

    - name: Show interface list members
      debug:
        var: list_members

    - name: Verify bridge ports
      community.routeros.api:
        path: interface bridge port
        cmd: "print"
      register: ports

    - name: Show ports
      debug:
        var: ports

    - name: Verify VLAN membership
      community.routeros.api:
        path: interface bridge vlan
        cmd: "print"
      register: vlans

    - name: Show bridge VLANs
      debug:
        var: vlans
