---
- name: Configure MikroTik hAP ax3 - Firewall, NordVPN, WiFi
  hosts: localhost
  gather_facts: false
  become: false
  vars_files:
    - group_vars/all/hap_ax3.yaml

  module_defaults:
    group/community.routeros.api:
      hostname: '{{ hap_ax3_host }}'
      username: '{{ hap_ax3_username }}'
      password: '{{ hap_ax3_password }}'
      tls: false

  tasks:
    # -------------------------
    # Cleanup - firewall rules
    # -------------------------
    - name: Gather existing firewall rules
      community.routeros.api:
        path: ip firewall filter
        cmd: 'print'
      register: fw_cleanup

    - name: Clean duplicate firewall rules
      community.routeros.api:
        path: ip firewall filter
        remove: "{{ item['.id'] }}"
      loop: "{{ fw_cleanup.msg | selectattr('comment', 'defined') | selectattr('comment', 'search', 'allow-established|proxmox-to-talos|proxmox-to-infra|infra-to-proxmox|infra-to-talos|infra-to-storage|talos-to-infra|talos-to-storage|all-to-talos-cilium-subnet|all-to-media|media-to-wifi|drop-wifi-to-interal|drop-media-to-internal|drop-wifi-to-internal|drop-talos-to-mgmt|drop-cluster-outbound|drop-all-inter-vlan|drop-wifi-router-mgmt') | list }}"
      ignore_errors: true

    # -------------------------
    # Cleanup - NAT rules
    # -------------------------
    - name: Gather NAT rules
      community.routeros.api:
        path: ip firewall nat
        cmd: 'print'
      register: nat_cleanup

    - name: Remove duplicate masquerade rules
      community.routeros.api:
        path: ip firewall nat
        remove: "{{ item['.id'] }}"
      loop: "{{ nat_cleanup.msg | selectattr('comment', 'defined') | selectattr('comment', 'equalto', 'masquerade-to-wan') | list }}"
      ignore_errors: true

    # -------------------------
    # Cleanup - mangle rules
    # -------------------------
    - name: Gather mangle rules
      community.routeros.api:
        path: ip firewall mangle
        cmd: 'print'
      register: mangle_cleanup

    - name: Remove existing ipsec-mss-fix mangle rule
      community.routeros.api:
        path: ip firewall mangle
        remove: "{{ item['.id'] }}"
      loop: "{{ mangle_cleanup.msg | selectattr('comment', 'defined') | selectattr('comment', 'equalto', 'ipsec-mss-fix') | list }}"
      ignore_errors: true

    # -------------------------
    # Cleanup - address lists
    # -------------------------
    - name: Gather all address list entries
      community.routeros.api:
        path: ip firewall address-list
        cmd: 'print'
      register: addr_list_cleanup

    - name: Remove nordvpn-local address list entries
      community.routeros.api:
        path: ip firewall address-list
        remove: "{{ item['.id'] }}"
      loop: "{{ addr_list_cleanup.msg | selectattr('list', 'equalto', 'nordvpn-local') | list }}"
      ignore_errors: true

    - name: Remove nordvpn-servers address list entries
      community.routeros.api:
        path: ip firewall address-list
        remove: "{{ item['.id'] }}"
      loop: "{{ addr_list_cleanup.msg | selectattr('list', 'equalto', 'nordvpn-servers') | list }}"
      ignore_errors: true

    # -------------------------
    # Cleanup - ALL NordVPN IPsec config
    # -------------------------
    - name: Gather IPsec identities
      community.routeros.api:
        path: ip ipsec identity
        cmd: 'print'
      register: ipsec_identity_cleanup

    - name: Remove all non-dynamic IPsec identities
      community.routeros.api:
        path: ip ipsec identity
        remove: "{{ item['.id'] }}"
      loop: "{{ ipsec_identity_cleanup.msg | selectattr('dynamic', 'equalto', false) | list }}"
      ignore_errors: true

    - name: Gather IPsec peers
      community.routeros.api:
        path: ip ipsec peer
        cmd: 'print'
      register: ipsec_peer_cleanup

    - name: Remove existing NordVPN peer
      community.routeros.api:
        path: ip ipsec peer
        remove: "{{ item['.id'] }}"
      loop: "{{ ipsec_peer_cleanup.msg | selectattr('name', 'equalto', 'NordVPN') | list }}"
      ignore_errors: true

    - name: Gather IPsec policies
      community.routeros.api:
        path: ip ipsec policy
        cmd: 'print'
      register: ipsec_policy_cleanup

    - name: Remove non-default IPsec policy templates
      community.routeros.api:
        path: ip ipsec policy
        remove: "{{ item['.id'] }}"
      loop: "{{ ipsec_policy_cleanup.msg | selectattr('template', 'equalto', true) | selectattr('default', 'equalto', false) | list }}"
      ignore_errors: true

    - name: Gather IPsec mode-configs
      community.routeros.api:
        path: ip ipsec mode-config
        cmd: 'print'
      register: ipsec_modeconfig_cleanup

    - name: Remove NordVPN mode-config
      community.routeros.api:
        path: ip ipsec mode-config
        remove: "{{ item['.id'] }}"
      loop: "{{ ipsec_modeconfig_cleanup.msg | selectattr('name', 'equalto', 'NordVPN') | list }}"
      ignore_errors: true

    - name: Gather IPsec policy groups
      community.routeros.api:
        path: ip ipsec policy group
        cmd: 'print'
      register: ipsec_policygroup_cleanup

    - name: Remove NordVPN policy group
      community.routeros.api:
        path: ip ipsec policy group
        remove: "{{ item['.id'] }}"
      loop: "{{ ipsec_policygroup_cleanup.msg | selectattr('name', 'equalto', 'NordVPN') | list }}"
      ignore_errors: true

    - name: Gather IPsec proposals
      community.routeros.api:
        path: ip ipsec proposal
        cmd: 'print'
      register: ipsec_proposal_cleanup

    - name: Remove NordVPN proposal
      community.routeros.api:
        path: ip ipsec proposal
        remove: "{{ item['.id'] }}"
      loop: "{{ ipsec_proposal_cleanup.msg | selectattr('name', 'equalto', 'NordVPN') | list }}"
      ignore_errors: true

    - name: Gather IPsec profiles
      community.routeros.api:
        path: ip ipsec profile
        cmd: 'print'
      register: ipsec_profile_cleanup

    - name: Remove NordVPN profile
      community.routeros.api:
        path: ip ipsec profile
        remove: "{{ item['.id'] }}"
      loop: "{{ ipsec_profile_cleanup.msg | selectattr('name', 'equalto', 'NordVPN') | list }}"
      ignore_errors: true

    # -------------------------
    # Fasttrack - disable for IPSec compatibility
    # -------------------------
    - name: Disable fasttrack for IPSec compatibility
      community.routeros.api_find_and_modify:
        path: ip firewall filter
        find:
          comment: 'defconf: fasttrack'
        values:
          disabled: 'yes'

    # -------------------------
    # NAT
    # -------------------------
    - name: Add masquerade rule
      community.routeros.api:
        path: ip firewall nat
        cmd: 'add chain=srcnat out-interface=ether1 action=masquerade comment=masquerade-to-wan'
      ignore_errors: true

    # -------------------------
    # NordVPN IKEv2 - Certificate
    # -------------------------
    - name: Fetch NordVPN root certificate locally
      ansible.builtin.get_url:
        url: https://downloads.nordcdn.com/certificates/root.der
        dest: /tmp/root.der
        force: true

    - name: Upload certificate via SCP
      ansible.builtin.command:
        cmd: >
          sshpass -p {{ hap_ax3_password }}
          scp -O
          -o StrictHostKeyChecking=no
          -o UserKnownHostsFile=/dev/null
          /tmp/root.der
          {{ hap_ax3_username }}@{{ hap_ax3_host }}:root.der

    - name: Import NordVPN root certificate
      community.routeros.api:
        path: certificate
        cmd: 'import file-name=root.der'

    # -------------------------
    # NordVPN IKEv2 - IPsec config
    # -------------------------
    - name: Add IPsec profile for NordVPN
      community.routeros.api:
        path: ip ipsec profile
        cmd: 'add name=NordVPN enc-algorithm=aes-256 hash-algorithm=sha256 dh-group=modp2048'

    - name: Add IPsec proposal for NordVPN
      community.routeros.api:
        path: ip ipsec proposal
        cmd: 'add name=NordVPN pfs-group=none enc-algorithms=aes-256-cbc auth-algorithms=sha256'

    - name: Add IPsec policy group for NordVPN
      community.routeros.api:
        path: ip ipsec policy group
        cmd: 'add name=NordVPN'

    - name: Add IPsec policy template for NordVPN
      community.routeros.api:
        path: ip ipsec policy
        cmd: 'add dst-address=0.0.0.0/0 group=NordVPN proposal=NordVPN src-address=0.0.0.0/0 template=yes'

    - name: Add IPsec mode-config for NordVPN
      community.routeros.api:
        path: ip ipsec mode-config
        cmd: 'add name=NordVPN responder=no'

    - name: Add NordVPN peer
      community.routeros.api:
        path: ip ipsec peer
        cmd: 'add address={{ nordvpn_server }} exchange-mode=ike2 name=NordVPN profile=NordVPN'

    - name: Add NordVPN identity
      community.routeros.api:
        path: ip ipsec identity
        cmd: "add auth-method=eap certificate=\"\" eap-methods=eap-mschapv2 generate-policy=port-strict mode-config=NordVPN peer=NordVPN policy-template-group=NordVPN username={{ nordvpn_username | trim | replace('\n', '') }} password={{ nordvpn_password | trim | replace('\n', '') }}"

    # -------------------------
    # NordVPN - Address lists
    # -------------------------
    - name: Add VLAN subnets to nordvpn-local address list
      community.routeros.api:
        path: ip firewall address-list
        cmd: 'add address={{ vlan.subnet }} list=nordvpn-local comment={{ vlan.name }}'
      loop: "{{ vlans | selectattr('vpn', 'equalto', true) | list }}"
      loop_control:
        loop_var: vlan

    - name: Assign address list to NordVPN mode-config
      community.routeros.api_find_and_modify:
        path: ip ipsec mode-config
        find:
          name: NordVPN
        values:
          src-address-list: nordvpn-local

    # -------------------------
    # NordVPN - MSS clamp
    # -------------------------
    - name: Add MSS clamp for IPSec MTU fix
      community.routeros.api:
        path: ip firewall mangle
        cmd: 'add chain=forward protocol=tcp tcp-flags=syn action=change-mss new-mss=1360 passthrough=yes comment=ipsec-mss-fix'

    # -------------------------
    # NordVPN - DNS leak prevention
    # -------------------------
    - name: Set NordVPN DNS servers
      community.routeros.api:
        path: ip dns
        cmd: 'set servers=103.86.96.100,103.86.99.100 allow-remote-requests=yes'

    # -------------------------
    # Firewall forward rules
    # -------------------------
    - name: Allow established and related
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward connection-state=established,related action=accept comment=allow-established'

    - name: Allow Proxmox to Talos
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.10.0/24 dst-address=192.168.30.0/24 action=accept comment=proxmox-to-talos'

    # Tailscale peer relay
    - name: Allow Proxmox to infra
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.10.0/24 dst-address=192.168.60.0/24 action=accept comment=proxmox-to-infra'

    # SSH/GUI access
    - name: Allow infra to Proxmox
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.60.0/24 dst-address=192.168.10.0/24 action=accept comment=infra-to-proxmox'

    # talosctl and local kubectl access
    - name: Allow infra to Talos
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.60.0/24 dst-address=192.168.30.0/24 action=accept comment=infra-to-talos'

    # GUI access
    - name: Allow infra to storage
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.60.0/24 dst-address=192.168.70.0/24 action=accept comment=infra-to-storage'

    # Tailscale peer relay
    - name: Allow Talos to infra
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.30.0/24 dst-address=192.168.60.0/24 action=accept comment=talos-to-infra'

    # NFS via democratic-csi
    - name: Allow Talos to storage
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.30.0/24 dst-address=192.168.70.0/24 action=accept comment=talos-to-storage'

    # LAN loadbalancers for e.g. media streaming
    - name: Allow all to Talos Cilium subnet
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.0.0/16 dst-address=192.168.30.200-192.168.30.250 action=accept comment=all-to-talos-cilium-subnet'

    # For streaming access
    - name: Allow all to media
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.0.0/16 dst-address=192.168.80.0/24 action=accept comment=all-to-media'

    # For WiiM app
    - name: Allow media to WiFi
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.80.0/24 dst-address=192.168.50.0/24 action=accept comment=media-to-wifi'

    - name: Drop WiFi to internal VLANs
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.50.0/24 dst-address=192.168.0.0/16 action=drop comment=drop-wifi-to-internal'

    - name: Drop media to internal VLANs
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.80.0/24 dst-address=192.168.0.0/16 action=drop comment=drop-media-to-internal'

    - name: Drop Talos to management
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.30.0/24 dst-address=192.168.10.0/24 action=drop comment=drop-talos-to-mgmt'

    - name: Drop (Proxmox)-cluster VLAN outbound
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.20.0/24 action=drop comment=drop-cluster-outbound'

    - name: Drop all other inter-VLAN forward traffic
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=forward src-address=192.168.0.0/16 dst-address=192.168.0.0/16 action=drop comment=drop-all-inter-vlan'

    # -------------------------
    # Firewall input rules
    # -------------------------
    - name: Drop WiFi access to router management ports only
      community.routeros.api:
        path: ip firewall filter
        cmd: 'add chain=input src-address=192.168.50.0/24 dst-port=22,80,8291,8728,8729 protocol=tcp action=drop comment=drop-wifi-router-mgmt'

    # -------------------------
    # WiFi SSID and security
    # -------------------------
    - name: Configure wifi1 5GHz
      community.routeros.api_find_and_modify:
        path: interface wifi
        find:
          default-name: wifi1
        values:
          configuration.ssid: '{{ wifi_ssid }}'
          configuration.mode: ap
          security.authentication-types: wpa2-psk,wpa3-psk
          security.passphrase: '{{ wifi_password }}'
          disabled: 'no'

    - name: Configure wifi2 2.4GHz
      community.routeros.api_find_and_modify:
        path: interface wifi
        find:
          default-name: wifi2
        values:
          configuration.ssid: '{{ wifi_ssid }}'
          configuration.mode: ap
          security.authentication-types: wpa2-psk,wpa3-psk
          security.passphrase: '{{ wifi_password }}'
          disabled: 'no'

  post_tasks:
    - name: Verify firewall rules
      community.routeros.api:
        path: ip firewall filter
        cmd: 'print'
      register: fw_result

    - name: Show firewall rules
      debug:
        var: fw_result

    - name: Verify IPsec active peers
      community.routeros.api:
        path: ip ipsec active-peers
        cmd: 'print'
      register: ipsec_peers

    - name: Show IPsec active peers
      debug:
        var: ipsec_peers
