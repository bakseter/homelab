- name: Configure /etc/hosts
  template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: '0644'

- name: Configure /etc/resolv.conf
  copy:
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      search lan
      nameserver 1.1.1.1

- name: Disable enterprise repository
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    line: 'Enabled: no'
    insertafter: EOF
    state: present

- name: Add proxmox no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/proxmox.sources
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: trixie
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
    owner: root
    group: root
    mode: '0644'

- name: Configure ceph no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph.sources
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/ceph-squid
      Suites: trixie
      Components: no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
    owner: root
    group: root
    mode: '0644'

- name: Install required packages
  apt:
    name:
      - vim
      - lm-sensors
      - expect
    state: present
    update_cache: true

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '{{ item.regexp }}'
    line: '{{ item.line }}'
    state: present
  loop:
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - {
        regexp: '^#?PermitRootLogin',
        line: 'PermitRootLogin prohibit-password',
      }
    - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
  notify: restart sshd

- name: Disable EEE and NIC offloading
  include_tasks: nic_eee_offloading.yaml
  when: nic_offload_interface is defined

- name: Run sensors-detect non-interactively
  shell: sensors-detect --auto
  args:
    creates: /etc/modules-load.d/lm_sensors.conf

- name: Download PVE sensors GUI script
  get_url:
    url: https://raw.githubusercontent.com/Meliox/PVE-mods/6a27678594be8afca3bc13256f5f26588f8bf7be/pve-mod-gui-sensors.sh
    dest: /tmp/pve-mod-gui-sensors.sh
    mode: '0755'

- name: Check if PVE sensors mod is active
  shell: grep -q "pve-mod-gui-sensors" /usr/share/pve-manager/js/pvemanagerlib.js && echo "present" || echo "absent"
  register: sensors_mod_status
  changed_when: false

- name: Install PVE sensors GUI mod non-interactively
  shell: |
    expect -c '
    set timeout 60
    log_user 1
    spawn bash /tmp/pve-mod-gui-sensors.sh install
    expect {
      timeout { puts "TIMEOUT waiting for prompt"; exit 1 }
      eof { puts "EOF reached"; exit 0 }
      -re "already installed" { puts "Already installed"; exit 0 }
      -re "C/a" { send "C\r"; exp_continue }
      -re "C/f" { send "C\r"; exp_continue }
      -re "y/N" { send "N\r"; exp_continue }
      -re "1/2/n" { send "1\r"; exp_continue }
      -re "any key to continue" { send "\r"; exp_continue }
    }
    '
  when: sensors_mod_status.stdout == "absent"
  register: sensors_install_result

- name: Show sensors install output
  debug:
    var: sensors_install_result.stdout_lines
