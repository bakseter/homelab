- name: Blacklist i915 driver
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/blacklist.conf
    line: 'blacklist i915'
    create: true
    state: present

- name: Configure VFIO PCI device binding by vendor ID
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/vfio.conf
    line: 'options vfio-pci ids={{ igpu_vfio_ids }}'
    create: true
    state: present
  notify: Update initramfs

- name: Load VFIO modules at boot
  ansible.builtin.lineinfile:
    path: /etc/modules-load.d/vfio.conf
    line: '{{ item }}'
    create: true
    state: present
  loop:
    - vfio
    - vfio_iommu_type1
    - vfio_pci

- name: Read current GRUB cmdline
  ansible.builtin.slurp:
    src: /etc/default/grub
  register: grub_file

- name: Set required GRUB kernel parameters
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT=")([^"]*)"'
    replace: '\1\2 intel_iommu=on iommu=pt i915.enable_guc=0 i915.enable_fbc=0 video=efifb:off video=vesa:off"'
  register: grub_changed

- name: Update grub
  ansible.builtin.command: update-grub
  when: grub_changed.changed
  changed_when: true

- name: Update initramfs
  ansible.builtin.command: update-initramfs -u -k all
  when: grub_changed.changed
  changed_when: true

- name: Reboot host
  ansible.builtin.reboot:
    reboot_timeout: 300
    post_reboot_delay: 30
    msg: 'Rebooting for VFIO/iGPU passthrough changes'
  when: grub_changed.changed
