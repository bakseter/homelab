---
- name: Migrate Proxmox nodes to VLAN-segmented network
  hosts: all
  serial: 1
  gather_facts: true

  pre_tasks:
    - name: Verify node is reachable
      ping:

    - name: Backup interfaces
      copy:
        src: /etc/network/interfaces
        dest: "/etc/network/interfaces.bak.{{ ansible_facts['date_time']['epoch'] }}"
        remote_src: true

  tasks:
    - name: Write new /etc/network/interfaces
      template:
        src: roles/proxmox-base/templates/interfaces.j2
        dest: /etc/network/interfaces
        owner: root
        group: root
        mode: '0644'

    - name: Update /etc/hosts
      template:
        src: roles/proxmox-base/templates/hosts.j2
        dest: /etc/hosts
        owner: root
        group: root
        mode: '0644'

    - name: Apply network config
      shell: ifreload -a
      async: 30
      poll: 0
      ignore_errors: true

    - name: Wait for node on new management IP
      wait_for:
        host: "{{ ansible_host_new }}"
        port: 22
        delay: 10
        timeout: 120
        state: started
      delegate_to: localhost
      become: false

    - name: Verify Proxmox UI reachable
      wait_for:
        host: "{{ ansible_host_new }}"
        port: 8006
        delay: 5
        timeout: 60
        state: started
      delegate_to: localhost
      become: false

  post_tasks:
    - name: Confirm VLAN interface is up
      shell: ip addr show vmbr0.{{ vlan_management }}
      register: vlan_check

    - name: Show interface state
      debug:
        var: vlan_check.stdout_lines

    - name: Confirm Corosync still running
      systemd:
        name: corosync
        state: started
      check_mode: true
      register: corosync_state

    - name: Fail if Corosync not running
      fail:
        msg: "Corosync is not running on {{ inventory_hostname }} after migration!"
      when: corosync_state.status.ActiveState != "active"
