---
- name: Configure MikroTik RB5009 - VLANs and DHCP
  hosts: localhost
  gather_facts: false
  become: false
  vars_files:
    - group_vars/all/rb5009.yaml

  module_defaults:
    group/community.routeros.api:
      hostname: '{{ rb5009_host }}'
      username: '{{ rb5009_username }}'
      password: '{{ rb5009_password }}'
      tls: false

  tasks:
    # -------------------------
    # Identity
    # -------------------------
    - name: Set identity
      community.routeros.api_find_and_modify:
        path: system identity
        find: {}
        values:
          name: rb5009

    # -------------------------
    # Bridge ports
    # -------------------------
    - name: Set ether2 as trunk to SG108E
      community.routeros.api_find_and_modify:
        path: interface bridge port
        find:
          interface: ether2
        values:
          pvid: '1'
          frame-types: admit-all

    - name: Set ether3 as access port VLAN 80 media
      community.routeros.api_find_and_modify:
        path: interface bridge port
        find:
          interface: ether3
        values:
          pvid: '80'
          frame-types: admit-only-untagged-and-priority-tagged

    - name: Set ether4 as access port VLAN 50
      community.routeros.api_find_and_modify:
        path: interface bridge port
        find:
          interface: ether4
        values:
          pvid: '50'
          frame-types: admit-only-untagged-and-priority-tagged

    - name: Set ether5 as access port VLAN 50
      community.routeros.api_find_and_modify:
        path: interface bridge port
        find:
          interface: ether5
        values:
          pvid: '50'
          frame-types: admit-only-untagged-and-priority-tagged

    - name: Set ether6 as access port to VLAN 50
      community.routeros.api_find_and_modify:
        path: interface bridge port
        find:
          interface: ether6
        values:
          pvid: '50'
          frame-types: admit-only-untagged-and-priority-tagged

    # -------------------------
    # Cleanup - defconf DHCP server only
    # -------------------------
    - name: Gather DHCP servers
      community.routeros.api:
        path: ip dhcp-server
        cmd: 'print'
      register: _dhcp_raw

    - name: Normalize DHCP server list
      set_fact:
        _dhcp_list: '{{ _dhcp_raw.msg if (_dhcp_raw.msg is iterable and _dhcp_raw.msg is not string) else [] }}'

    - name: Remove defconf DHCP server if present
      community.routeros.api:
        path: ip dhcp-server
        remove: "{{ item['.id'] }}"
      loop: "{{ _dhcp_list | selectattr('name', 'equalto', 'defconf') | list }}"
      ignore_errors: true

    # -------------------------
    # Cleanup - stale interface list members for deleted interfaces
    # (catches orphaned entries where interface is an internal ID like '*13')
    # -------------------------
    - name: Gather interface list members for cleanup
      community.routeros.api:
        path: interface list member
        cmd: 'print'
      register: _iface_list_cleanup_raw

    - name: Normalize interface list for cleanup
      set_fact:
        _iface_list_cleanup: '{{ _iface_list_cleanup_raw.msg if (_iface_list_cleanup_raw.msg is iterable and _iface_list_cleanup_raw.msg is not string) else [] }}'

    - name: Remove stale interface list members pointing to deleted interfaces
      community.routeros.api:
        path: interface list member
        remove: "{{ item['.id'] }}"
      loop: "{{ _iface_list_cleanup | selectattr('interface', 'match', '^\\*[0-9A-Fa-f]+$') | list }}"
      ignore_errors: true

    # -------------------------
    # Cleanup - stale media virtual APs only
    # -------------------------
    - name: Gather WiFi interfaces
      community.routeros.api:
        path: interface wifi
        cmd: 'print'
      register: _wifi_raw

    - name: Normalize WiFi interface list
      set_fact:
        _wifi_list: '{{ _wifi_raw.msg if (_wifi_raw.msg is iterable and _wifi_raw.msg is not string) else [] }}'

    - name: Remove stale media virtual APs
      community.routeros.api:
        path: interface wifi
        remove: "{{ item['.id'] }}"
      loop: "{{ _wifi_list | selectattr('name', 'defined') | selectattr('name', 'search', 'media') | list }}"
      ignore_errors: true

    # -------------------------
    # Cleanup - stale media bridge ports only
    # -------------------------
    - name: Gather bridge ports
      community.routeros.api:
        path: interface bridge port
        cmd: 'print'
      register: _bridge_ports_raw

    - name: Normalize bridge port list
      set_fact:
        _bridge_ports_list: '{{ _bridge_ports_raw.msg if (_bridge_ports_raw.msg is iterable and _bridge_ports_raw.msg is not string) else [] }}'

    - name: Remove stale media bridge ports
      community.routeros.api:
        path: interface bridge port
        remove: "{{ item['.id'] }}"
      loop: "{{ _bridge_ports_list | selectattr('interface', 'defined') | selectattr('interface', 'search', 'media') | list }}"
      ignore_errors: true

    # -------------------------
    # Bridge VLAN membership - upsert
    # -------------------------
    - name: Gather existing bridge VLANs
      community.routeros.api:
        path: interface bridge vlan
        cmd: 'print'
      register: _bridge_vlans_raw

    - name: Normalize bridge VLAN list
      set_fact:
        _bridge_vlans_list: '{{ _bridge_vlans_raw.msg if (_bridge_vlans_raw.msg is iterable and _bridge_vlans_raw.msg is not string) else [] }}'

    # Macro: for each VLAN, update if a static entry exists, add if not.
    # The vlan-ids field comes back as an integer from RouterOS.

    - name: Update bridge VLAN 88 if present
      community.routeros.api_find_and_modify:
        path: interface bridge vlan
        find:
          vlan-ids: '88'
        values:
          bridge: bridge
          tagged: 'bridge'
          untagged: 'ether2,ether3,ether4,ether5,ether6'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 88) | selectattr('dynamic', 'equalto', false) | list | length > 0
      ignore_errors: true

    - name: Add bridge VLAN 88 if absent
      community.routeros.api:
        path: interface bridge vlan
        cmd: 'add bridge=bridge vlan-ids=88 tagged=bridge untagged=ether2,ether3,ether4,ether5,ether6'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 88) | selectattr('dynamic', 'equalto', false) | list | length == 0
      ignore_errors: true

    - name: Update bridge VLAN 10 if present
      community.routeros.api_find_and_modify:
        path: interface bridge vlan
        find:
          vlan-ids: '10'
        values:
          bridge: bridge
          tagged: 'bridge,ether2'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 10) | selectattr('dynamic', 'equalto', false) | list | length > 0
      ignore_errors: true

    - name: Add bridge VLAN 10 if absent
      community.routeros.api:
        path: interface bridge vlan
        cmd: 'add bridge=bridge vlan-ids=10 tagged=bridge,ether2'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 10) | selectattr('dynamic', 'equalto', false) | list | length == 0
      ignore_errors: true

    - name: Update bridge VLAN 20 if present
      community.routeros.api_find_and_modify:
        path: interface bridge vlan
        find:
          vlan-ids: '20'
        values:
          bridge: bridge
          tagged: 'bridge,ether2'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 20) | selectattr('dynamic', 'equalto', false) | list | length > 0
      ignore_errors: true

    - name: Add bridge VLAN 20 if absent
      community.routeros.api:
        path: interface bridge vlan
        cmd: 'add bridge=bridge vlan-ids=20 tagged=bridge,ether2'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 20) | selectattr('dynamic', 'equalto', false) | list | length == 0
      ignore_errors: true

    - name: Update bridge VLAN 30 if present
      community.routeros.api_find_and_modify:
        path: interface bridge vlan
        find:
          vlan-ids: '30'
        values:
          bridge: bridge
          tagged: 'bridge,ether2'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 30) | selectattr('dynamic', 'equalto', false) | list | length > 0
      ignore_errors: true

    - name: Add bridge VLAN 30 if absent
      community.routeros.api:
        path: interface bridge vlan
        cmd: 'add bridge=bridge vlan-ids=30 tagged=bridge,ether2'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 30) | selectattr('dynamic', 'equalto', false) | list | length == 0
      ignore_errors: true

    - name: Update bridge VLAN 50 if present
      community.routeros.api_find_and_modify:
        path: interface bridge vlan
        find:
          vlan-ids: '50'
        values:
          bridge: bridge
          tagged: 'bridge,ether2'
          untagged: 'ether4,ether5,ether6'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 50) | selectattr('dynamic', 'equalto', false) | list | length > 0
      ignore_errors: true

    - name: Add bridge VLAN 50 if absent
      community.routeros.api:
        path: interface bridge vlan
        cmd: 'add bridge=bridge vlan-ids=50 tagged=bridge,ether2 untagged=ether4,ether5,ether6'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 50) | selectattr('dynamic', 'equalto', false) | list | length == 0
      ignore_errors: true

    - name: Update bridge VLAN 60 if present
      community.routeros.api_find_and_modify:
        path: interface bridge vlan
        find:
          vlan-ids: '60'
        values:
          bridge: bridge
          tagged: 'bridge,ether2'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 60) | selectattr('dynamic', 'equalto', false) | list | length > 0
      ignore_errors: true

    - name: Add bridge VLAN 60 if absent
      community.routeros.api:
        path: interface bridge vlan
        cmd: 'add bridge=bridge vlan-ids=60 tagged=bridge,ether2'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 60) | selectattr('dynamic', 'equalto', false) | list | length == 0
      ignore_errors: true

    - name: Update bridge VLAN 70 if present
      community.routeros.api_find_and_modify:
        path: interface bridge vlan
        find:
          vlan-ids: '70'
        values:
          bridge: bridge
          tagged: 'bridge,ether2'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 70) | selectattr('dynamic', 'equalto', false) | list | length > 0
      ignore_errors: true

    - name: Add bridge VLAN 70 if absent
      community.routeros.api:
        path: interface bridge vlan
        cmd: 'add bridge=bridge vlan-ids=70 tagged=bridge,ether2'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 70) | selectattr('dynamic', 'equalto', false) | list | length == 0
      ignore_errors: true

    - name: Update bridge VLAN 80 if present
      community.routeros.api_find_and_modify:
        path: interface bridge vlan
        find:
          vlan-ids: '80'
        values:
          bridge: bridge
          tagged: 'bridge,ether2'
          untagged: 'ether3'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 80) | selectattr('dynamic', 'equalto', false) | list | length > 0
      ignore_errors: true

    - name: Add bridge VLAN 80 if absent
      community.routeros.api:
        path: interface bridge vlan
        cmd: 'add bridge=bridge vlan-ids=80 tagged=bridge,ether2 untagged=ether3'
      when: _bridge_vlans_list | selectattr('vlan-ids', 'equalto', 80) | selectattr('dynamic', 'equalto', false) | list | length == 0
      ignore_errors: true

    # -------------------------
    # VLAN interfaces - add only if absent
    # -------------------------
    - name: Gather existing VLAN interfaces
      community.routeros.api:
        path: interface vlan
        cmd: 'print'
      register: _vlan_ifaces_raw

    - name: Normalize VLAN interface list
      set_fact:
        _vlan_ifaces_list: '{{ _vlan_ifaces_raw.msg if (_vlan_ifaces_raw.msg is iterable and _vlan_ifaces_raw.msg is not string) else [] }}'

    - name: Add VLAN interface if absent
      community.routeros.api:
        path: interface vlan
        cmd: 'add name=vlan{{ vlan.id }} vlan-id={{ vlan.id }} interface=bridge comment={{ vlan.name }}'
      loop: '{{ vlans }}'
      loop_control:
        loop_var: vlan
      when: _vlan_ifaces_list | selectattr('name', 'equalto', 'vlan' ~ vlan.id) | list | length == 0
      ignore_errors: true

    - name: Update comment on existing VLAN interface
      community.routeros.api_find_and_modify:
        path: interface vlan
        find:
          name: 'vlan{{ vlan.id }}'
        values:
          comment: '{{ vlan.name }}'
      loop: '{{ vlans }}'
      loop_control:
        loop_var: vlan
      when: _vlan_ifaces_list | selectattr('name', 'equalto', 'vlan' ~ vlan.id) | list | length > 0
      ignore_errors: true

    # -------------------------
    # IP addresses
    # -------------------------
    - name: Gather existing IP addresses
      community.routeros.api:
        path: ip address
        cmd: 'print'
      register: _ip_addrs_raw

    - name: Normalize IP address list
      set_fact:
        _ip_addrs_list: '{{ _ip_addrs_raw.msg if (_ip_addrs_raw.msg is iterable and _ip_addrs_raw.msg is not string) else [] }}'

    - name: Add IP address if absent
      community.routeros.api:
        path: ip address
        cmd: 'add address={{ vlan.gateway }}/24 interface=vlan{{ vlan.id }} comment={{ vlan.name }}'
      loop: '{{ vlans }}'
      loop_control:
        loop_var: vlan
      when: _ip_addrs_list | selectattr('interface', 'equalto', 'vlan' ~ vlan.id) | list | length == 0
      ignore_errors: true

    - name: Update IP address if present
      community.routeros.api_find_and_modify:
        path: ip address
        find:
          interface: 'vlan{{ vlan.id }}'
        values:
          address: '{{ vlan.gateway }}/24'
          comment: '{{ vlan.name }}'
      loop: '{{ vlans }}'
      loop_control:
        loop_var: vlan
      when: _ip_addrs_list | selectattr('interface', 'equalto', 'vlan' ~ vlan.id) | list | length > 0
      ignore_errors: true

    # -------------------------
    # DHCP pools
    # -------------------------
    - name: Gather existing DHCP pools
      community.routeros.api:
        path: ip pool
        cmd: 'print'
      register: _dhcp_pools_raw

    - name: Normalize DHCP pool list
      set_fact:
        _dhcp_pools_list: '{{ _dhcp_pools_raw.msg if (_dhcp_pools_raw.msg is iterable and _dhcp_pools_raw.msg is not string) else [] }}'

    - name: Add DHCP pool if absent
      community.routeros.api:
        path: ip pool
        cmd: 'add name=dhcp-vlan{{ vlan.id }} ranges={{ vlan.dhcp_pool_start }}-{{ vlan.dhcp_pool_end }}'
      loop: '{{ vlans }}'
      loop_control:
        loop_var: vlan
      when:
        - vlan.dhcp
        - _dhcp_pools_list | selectattr('name', 'equalto', 'dhcp-vlan' ~ vlan.id) | list | length == 0
      ignore_errors: true

    - name: Update DHCP pool ranges if present
      community.routeros.api_find_and_modify:
        path: ip pool
        find:
          name: 'dhcp-vlan{{ vlan.id }}'
        values:
          ranges: '{{ vlan.dhcp_pool_start }}-{{ vlan.dhcp_pool_end }}'
      loop: '{{ vlans }}'
      loop_control:
        loop_var: vlan
      when:
        - vlan.dhcp
        - _dhcp_pools_list | selectattr('name', 'equalto', 'dhcp-vlan' ~ vlan.id) | list | length > 0
      ignore_errors: true

    # -------------------------
    # DHCP servers
    # -------------------------
    - name: Gather DHCP servers
      community.routeros.api:
        path: ip dhcp-server
        cmd: 'print'
      register: _dhcp_servers_raw

    - name: Normalize DHCP server list
      set_fact:
        _dhcp_servers_list: '{{ _dhcp_servers_raw.msg if (_dhcp_servers_raw.msg is iterable and _dhcp_servers_raw.msg is not string) else [] }}'

    - name: Add DHCP server if absent
      community.routeros.api:
        path: ip dhcp-server
        cmd: 'add name=dhcp-vlan{{ vlan.id }} interface=vlan{{ vlan.id }} address-pool=dhcp-vlan{{ vlan.id }} disabled=no'
      loop: '{{ vlans }}'
      loop_control:
        loop_var: vlan
      when:
        - vlan.dhcp
        - _dhcp_servers_list | selectattr('name', 'equalto', 'dhcp-vlan' ~ vlan.id) | list | length == 0
      ignore_errors: true

    - name: Ensure DHCP server is enabled if present
      community.routeros.api_find_and_modify:
        path: ip dhcp-server
        find:
          name: 'dhcp-vlan{{ vlan.id }}'
        values:
          disabled: 'no'
          interface: 'vlan{{ vlan.id }}'
          address-pool: 'dhcp-vlan{{ vlan.id }}'
      loop: '{{ vlans }}'
      loop_control:
        loop_var: vlan
      when:
        - vlan.dhcp
        - _dhcp_servers_list | selectattr('name', 'equalto', 'dhcp-vlan' ~ vlan.id) | list | length > 0
      ignore_errors: true

    # -------------------------
    # DHCP networks
    # -------------------------
    - name: Gather existing DHCP networks
      community.routeros.api:
        path: ip dhcp-server network
        cmd: 'print'
      register: _dhcp_networks_raw

    - name: Normalize DHCP network list
      set_fact:
        _dhcp_networks_list: '{{ _dhcp_networks_raw.msg if (_dhcp_networks_raw.msg is iterable and _dhcp_networks_raw.msg is not string) else [] }}'

    - name: Add DHCP network if absent
      community.routeros.api:
        path: ip dhcp-server network
        cmd: 'add address={{ vlan.subnet }} gateway={{ vlan.gateway }} dns-server={{ vlan.gateway }} comment={{ vlan.name }}'
      loop: '{{ vlans }}'
      loop_control:
        loop_var: vlan
      when:
        - vlan.dhcp
        - _dhcp_networks_list | selectattr('address', 'equalto', vlan.subnet) | list | length == 0
      ignore_errors: true

    - name: Update DHCP network if present
      community.routeros.api_find_and_modify:
        path: ip dhcp-server network
        find:
          address: '{{ vlan.subnet }}'
        values:
          gateway: '{{ vlan.gateway }}'
          dns-server: '{{ vlan.gateway }}'
          comment: '{{ vlan.name }}'
      loop: '{{ vlans }}'
      loop_control:
        loop_var: vlan
      when:
        - vlan.dhcp
        - _dhcp_networks_list | selectattr('address', 'equalto', vlan.subnet) | list | length > 0
      ignore_errors: true

    # -------------------------
    # Interface list members
    # -------------------------
    - name: Gather existing interface list members
      community.routeros.api:
        path: interface list member
        cmd: 'print'
      register: _iface_list_raw

    - name: Normalize interface list members
      set_fact:
        _iface_list: '{{ _iface_list_raw.msg if (_iface_list_raw.msg is iterable and _iface_list_raw.msg is not string) else [] }}'

    - name: Add VLAN to LAN interface list if absent
      community.routeros.api:
        path: interface list member
        cmd: 'add interface=vlan{{ vlan.id }} list=LAN comment={{ vlan.name }}'
      loop: '{{ vlans }}'
      loop_control:
        loop_var: vlan
      when: _iface_list | selectattr('interface', 'equalto', 'vlan' ~ vlan.id) | selectattr('list', 'equalto', 'LAN') | list | length == 0
      ignore_errors: true

    # -------------------------
    # Enable VLAN filtering LAST
    # -------------------------
    - name: Enable bridge VLAN filtering
      community.routeros.api_find_and_modify:
        path: interface bridge
        find:
          name: bridge
        values:
          vlan-filtering: 'yes'
          pvid: '10'

    # -------------------------
    # Disable default 192.168.88.1 LAST
    # -------------------------
    - name: Gather 192.168.88.1 address state
      community.routeros.api:
        path: ip address
        cmd: 'print'
      register: _default_addr_raw

    - name: Normalize default address list
      set_fact:
        _default_addr_list: '{{ _default_addr_raw.msg if (_default_addr_raw.msg is iterable and _default_addr_raw.msg is not string) else [] }}'

    - name: Disable default 192.168.88.1 address
      community.routeros.api_find_and_modify:
        path: ip address
        find:
          address: 192.168.88.1/24
        values:
          disabled: 'yes'
      when: _default_addr_list | selectattr('address', 'equalto', '192.168.88.1/24') | selectattr('disabled', 'equalto', false) | list | length > 0

  post_tasks:
    - name: Verify VLAN interfaces
      community.routeros.api:
        path: interface vlan
        cmd: 'print'
      register: vlan_result

    - name: Show VLANs
      debug:
        var: vlan_result

    - name: Verify DHCP servers
      community.routeros.api:
        path: ip dhcp-server
        cmd: 'print'
      register: dhcp_result

    - name: Show DHCP servers
      debug:
        var: dhcp_result

    - name: Verify VLAN membership
      community.routeros.api:
        path: interface bridge vlan
        cmd: 'print'
      register: vlans_result

    - name: Show bridge VLANs
      debug:
        var: vlans_result

    - name: Verify bridge ports
      community.routeros.api:
        path: interface bridge port
        cmd: 'print'
      register: ports

    - name: Show ports
      debug:
        var: ports

    - name: Verify interface list members
      community.routeros.api:
        path: interface list member
        cmd: 'print'
      register: list_members

    - name: Show interface list members
      debug:
        var: list_members
