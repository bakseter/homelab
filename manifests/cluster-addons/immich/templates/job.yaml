apiVersion: batch/v1
kind: Job
metadata:
  name: pvc-migration
  namespace: immich
spec:
  template:
    spec:
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: Never
      containers:
        - name: migrate
          image: alpine:latest
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache rsync && \
              echo "Starting migration..." && \
              rsync -avh --progress /source/ /dest/ && \
              echo "Migration complete." && \
              ls -lah /dest/
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: source
              mountPath: /source
              readOnly: true
            - name: dest
              mountPath: /dest
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: immich-library-encrypted
        - name: dest
          persistentVolumeClaim:
            claimName: immich-library
