apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: jellyfin
    repo: https://jellyfin.github.io/jellyfin-helm
    version: 3.2.0
    releaseName: jellyfin
    valuesFile: values.yaml

patches:
  - target:
      kind: PersistentVolume
      name: jellyfin-config
    patch: |-
      - op: add
        path: /spec/template/metadata/labels/recurring-job.longhorn.io~1source
        value: enabled

      - op: add
        path: /spec/template/metadata/labels/recurring-job-group.longhorn.io~1hetzner-backup
        value: enabled

  - target:
      kind: PersistentVolume
      name: jellyfin-media
    patch: |-
      - op: add
        path: /spec/template/metadata/labels/recurring-job.longhorn.io~1source
        value: enabled

      - op: add
        path: /spec/template/metadata/labels/recurring-job-group.longhorn.io~1hetzner-backup
        value: enabled
