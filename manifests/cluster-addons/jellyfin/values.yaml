image:
  repository: docker.io/jellyfin/jellyfin
  tag: 10.10.7@sha256:7ae36aab93ef9b6aaff02b37f8bb23df84bb2d7a3f6054ec8fc466072a648ce2

resources:
  limits:
    gpu.intel.com/i915: '1'

persistence:
  media:
    accessMode: ReadWriteMany
    size: 150Gi

deploymentStrategy:
  type: Recreate

ingress:
  enabled: true
  className: tailscale
  annotations:
    tailscale.com/tags: 'tag:k8s,tag:media'
  hosts:
    - host: jellyfin
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - hosts:
        - jellyfin

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault
  supplementalGroups:
    - 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

volumes:
  - name: tmp
    emptyDir: {}

volumeMounts:
  - name: tmp
    mountPath: /tmp
    readOnly: false

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
