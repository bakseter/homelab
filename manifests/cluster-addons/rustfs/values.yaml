rustfs:
  image:
    rustfs:
      repository: rustfs/rustfs
      tag: 1.0.0-beta.10@sha256:60f4f2f41ce95216f8cac676e69f9d90c0bfec458a3bc7fd7fb9b7c2452ac57a
    initImage:
      repository: busybox
      tag: stable@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662

  mode:
    standalone:
      enabled: true

    distributed:
      enabled: false

  replicaCount: 2

  config:
    rustfs:
      log_level: warn

  secret:
    rustfs:
      access_key: rustfs
      secret_key: rustfs

  storageclass:
    name: longhorn
    dataStorageSize: 20Gi
    logStorageSize: 2Gi

  ingress:
    enabled: false

  podSecurityContext:
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
