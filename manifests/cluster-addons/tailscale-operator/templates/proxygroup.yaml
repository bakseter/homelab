apiVersion: tailscale.com/v1alpha1
kind: ProxyGroup
metadata:
  name: homelab
  namespace: tailscale
spec:
  type: kube-apiserver
  replicas: 2
  kubeAPIServer:
    mode: auth
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyGroup
metadata:
  name: envoy-gateway
  namespace: tailscale
spec:
  type: ingress
  replicas: 2
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyGroup
metadata:
  name: technitium
  namespace: tailscale
spec:
  type: ingress
  replicas: 2
  tags: ['tag:k8s', 'tag:dns']
