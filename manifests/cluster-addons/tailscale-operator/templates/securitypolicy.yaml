apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: authentik-oidc-sre
  namespace: tailscale
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: bakseter-net-gateway-sre
  oidc:
    provider:
      issuer: https://authentik.bakseter.net/application/o/envoy-gateway-sre/
    clientID: envoy-gateway-sre
    clientSecret:
      name: authentik-oidc-secret
      namespace: tailscale
    redirectURL: https://argocd.sre.bakseter.net/oauth2/callback
    scopes:
      - openid
      - profile
      - email
    forwardAccessToken: true
    refreshToken: true
