apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: tailscale-int
  namespace: tailscale
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        pod:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      gateway.envoyproxy.io/owning-gateway-name: int-bakseter-net
                  topologyKey: bakseter.net/physical-node
      envoyService:
        type: LoadBalancer
        loadBalancerClass: tailscale
        annotations:
          tailscale.com/hostname: gateway-envoy-int
          tailscale.com/proxy-group: envoy-gateway
          tailscale.com/tags: 'tag:k8s'
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: tailscale-home
  namespace: tailscale
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        pod:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      gateway.envoyproxy.io/owning-gateway-name: home-bakseter-net
                  topologyKey: bakseter.net/physical-node
      envoyService:
        type: LoadBalancer
        loadBalancerClass: tailscale
        annotations:
          tailscale.com/hostname: gateway-envoy-home
          tailscale.com/proxy-group: envoy-gateway
          tailscale.com/tags: 'tag:k8s,tag:home'
  telemetry:
    accessLog:
      settings:
        - format:
            type: JSON
            json:
              start_time: "%START_TIME%"
              method: "%REQ(:METHOD)%"
              path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
              protocol: "%PROTOCOL%"
              response_code: "%RESPONSE_CODE%"
              duration: "%DURATION%"
              upstream_cluster: "%UPSTREAM_CLUSTER%"
              upstream_host: "%UPSTREAM_HOST%"
              route_name: "%ROUTE_NAME%"
              trace_id: "%TRACE_ID%"
          sinks:
            - type: OpenTelemetry
              openTelemetry:
                host: alloy.monitoring.svc.cluster.local
                port: 4317
    tracing:
      samplingRate: 100
      provider:
        backendRefs:
        - name: alloy
          namespace: monitoring
          port: 4317
        type: OpenTelemetry
