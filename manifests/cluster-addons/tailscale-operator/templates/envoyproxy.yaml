apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: tailscale-proxy-int
  namespace: tailscale
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        pod:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      gateway.envoyproxy.io/owning-gateway-name: bakseter-net-gateway-int
                  topologyKey: bakseter.net/physical-node
      envoyService:
        type: LoadBalancer
        loadBalancerClass: tailscale
        annotations:
          tailscale.com/hostname: gateway-envoy-int
          tailscale.com/proxy-group: envoy-gateway
          tailscale.com/tags: 'tag:k8s'
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: tailscale-proxy-home
  namespace: tailscale
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        pod:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      gateway.envoyproxy.io/owning-gateway-name: bakseter-net-gateway-home
                  topologyKey: bakseter.net/physical-node
      envoyService:
        type: LoadBalancer
        loadBalancerClass: tailscale
        annotations:
          tailscale.com/hostname: gateway-envoy-home
          tailscale.com/proxy-group: envoy-gateway
          tailscale.com/tags: 'tag:k8s,tag:home'
  telemetry:
    tracing:
      samplingRate: 0.5
      provider:
        backendRefs:
        - name: alloy
          namespace: monitoring
          port: 4317
        type: OpenTelemetry
