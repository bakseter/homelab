apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: tailscale-int
  namespace: tailscale
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        name: tailscale-int-gateway
        replicas: 2
        pod:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      gateway.envoyproxy.io/owning-gateway-name: tailscale-int
                  topologyKey: bakseter.net/physical-node
      envoyService:
        name: tailscale-int-gateway
        type: LoadBalancer
        loadBalancerClass: tailscale
        annotations:
          tailscale.com/hostname: gateway-envoy-int
          tailscale.com/proxy-group: envoy-gateway
          tailscale.com/tags: 'tag:k8s'
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: tailscale-home
  namespace: tailscale
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        name: tailscale-home-gateway
        replicas: 2
        pod:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      gateway.envoyproxy.io/owning-gateway-name: tailscale-home
                  topologyKey: bakseter.net/physical-node
      envoyService:
        name: tailscale-home-gateway
        type: LoadBalancer
        loadBalancerClass: tailscale
        annotations:
          tailscale.com/hostname: gateway-envoy-home
          tailscale.com/proxy-group: envoy-gateway
          tailscale.com/tags: 'tag:k8s,tag:home'
  telemetry:
    accessLog:
      settings:
        - format:
            type: JSON
            json:
              start_time: '%START_TIME%'
              method: '%REQ(:METHOD)%'
              x-envoy-origin-path: '%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%'
              protocol: '%PROTOCOL%'
              response_code: '%RESPONSE_CODE%'
              response_flags: '%RESPONSE_FLAGS%'
              response_code_details: '%RESPONSE_CODE_DETAILS%'
              connection_termination_details: '%CONNECTION_TERMINATION_DETAILS%'
              upstream_transport_failure_reason: '%UPSTREAM_TRANSPORT_FAILURE_REASON%'
              bytes_received: '%BYTES_RECEIVED%'
              bytes_sent: '%BYTES_SENT%'
              duration: '%DURATION%'
              x-envoy-upstream-service-time: '%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%'
              x-forwarded-for: '%REQ(X-FORWARDED-FOR)%'
              user-agent: '%REQ(USER-AGENT)%'
              x-request-id: '%REQ(X-REQUEST-ID)%'
              :authority: '%REQ(:AUTHORITY)%'
              upstream_host: '%UPSTREAM_HOST%'
              upstream_cluster: '%UPSTREAM_CLUSTER%'
              upstream_local_address: '%UPSTREAM_LOCAL_ADDRESS%'
              downstream_local_address: '%DOWNSTREAM_LOCAL_ADDRESS%'
              downstream_remote_address: '%DOWNSTREAM_REMOTE_ADDRESS%'
              requested_server_name: '%REQUESTED_SERVER_NAME%'
              route_name: '%ROUTE_NAME%'
              trace_id: '%TRACE_ID%'

          sinks:
            - type: OpenTelemetry
              openTelemetry:
                backendRefs:
                  - name: alloy
                    namespace: monitoring
                    port: 4317
    tracing:
      samplingRate: 100
      provider:
        type: OpenTelemetry
        backendRefs:
          - name: alloy
            namespace: monitoring
            port: 4317
      customTags:
        'k8s.pod.name':
          type: Environment
          environment:
            name: ENVOY_POD_NAME
            defaultValue: '-'
        'k8s.namespace.name':
          type: Environment
          environment:
            name: ENVOY_POD_NAMESPACE
            defaultValue: 'envoy-gateway-system'
---
