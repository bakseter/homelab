      tailscale.com/managed: 'true'
      tailscale.com/parent-resource: envoy-gateway
      tailscale.com/parent-resource-type: proxygroup

  ingress:
    - fromEntities:
        - world
      icmps:
        - fields:
          - type: '8'

  egress:
    - toEntities:
        - world

    - toEntities:
        - host
      toPorts:
        - ports:
            - port: '1900'
