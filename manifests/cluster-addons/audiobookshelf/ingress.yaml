apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
spec:
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - backend:
              service:
                name: audiobookshelf
                port:
                  number: 13378
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - audiobookshelf
