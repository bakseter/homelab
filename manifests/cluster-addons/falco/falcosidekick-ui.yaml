apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: falcosidekick-ui-redis
  namespace: falco
  labels:
    app.kubernetes.io/name: falcosidekick-ui-redis
spec:
  serviceName: falcosidekick-ui-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: falcosidekick-ui-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: falcosidekick-ui-redis
    spec:
      containers:
        - name: redis
          image: docker.io/redis/redis-stack:7.2.0-v11
          ports:
            - containerPort: 6379
              name: redis
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: redis-data
      spec:
        accessModes: ['ReadWriteOnce']
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: falcosidekick-ui-redis
  namespace: falco
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app.kubernetes.io/name: falcosidekick-ui-redis
---
apiVersion: instance.falcosecurity.dev/v1alpha1
kind: Component
metadata:
  name: falcosidekick-ui
  namespace: falco
spec:
  component:
    type: falcosidekick-ui
    version: '2.2.0'
  replicas: 2
  podTemplateSpec:
    spec:
      containers:
        - name: falcosidekick-ui
          env:
            - name: FALCOSIDEKICK_UI_REDIS_URL
              value: 'falcosidekick-ui-redis:6379'
            - name: FALCOSIDEKICK_UI_LOGLEVEL
              value: 'debug'
            - name: FALCOSIDEKICK_UI_RATELIMIT
              value: '500' # requests per second, default is very low
