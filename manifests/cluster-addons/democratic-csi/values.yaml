democratic-csi:
  csiDriver:
    name: org.democratic-csi.truenas-nfs

  storageClasses:
    - name: truenas-nfs
      defaultClass: false
      reclaimPolicy: Delete
      volumeBindingMode: Immediate
      allowVolumeExpansion: true
      parameters:
        fsType: nfs
        detachedVolumesFromSnapshots: 'false'
      mountOptions:
        - noatime
        - nodiratime
        - nfsvers=4.1 # upgrade from v3
        - rsize=131072 # 128k read buffer
        - wsize=131072 # 128k write buffer
        - hard
        - timeo=600
        - retrans=2
        - nconnect=4
      secrets:
        provisioner-secret:
        controller-publish-secret:
        node-stage-secret:
        node-publish-secret:
        controller-expand-secret:

  driver:
    existingConfigSecret: freenas-api-nfs-secret
    config:
      driver: freenas-api-nfs

      httpConnection:
        protocol: http
        host: 192.168.70.200
        port: 80
        allowInsecure: true

      zfs:
        datasetParentName: main/k8s
        detachedSnapshotsDatasetParentName: main/k8s-snapshots
        datasetEnableQuotas: true
        datasetEnableReservation: false
        datasetPermissionsMode: '0777'
        datasetPermissionsUser: 0
        datasetPermissionsGroup: 0

      nfs:
        shareHost: 192.168.70.200
        shareAlldirs: false
        shareAllowedHosts: []
        shareAllowedNetworks: [] # optionally restrict e.g. ["192.168.1.0/24"]
        shareMaprootUser: root
        shareMaprootGroup: wheel
        shareMapallUser: ''
        shareMapallGroup: ''

  node:
    hostNetwork: true
    driver:
      extraEnv: []

snapshot-controller:
  fullnameOverride: snapshot-controller
