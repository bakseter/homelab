velero:
  snapshotsEnabled: true
  deployNodeAgent: true

  image:
    repository: docker.io/velero/velero
    tag: v1.18.2@sha256:37396519f399536e5f01427d723565ae69294ec3fb5625cf1c87c09eaa9de16b

  extraVolumes:
    - emptyDir: {}
      name: udmrepo
  extraVolumeMounts:
    - mountPath: /nonexistent
      name: udmrepo

  configuration:
    features: EnableCSI
    uploaderType: kopia

    volumeSnapshotLocation:
      - name: default
        provider: csi

    backupStorageLocation:
      - name: default
        provider: aws
        bucket: bakseter-homelab-velero
        config:
          region: eu-central
          s3ForcePathStyle: true
          s3Url: https://hel1.your-objectstorage.com

  credentials:
    existingSecret: velero-s3-credentials

  initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.14.2@sha256:0751144c1c8e52d52c48717fbd13ad5a3061e612ae4d7ad744a946cd5b139d1a
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
      volumeMounts:
        - mountPath: /target
          name: plugins

  nodeAgent:
    podSecurityContext: {}

    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    extraVolumes:
      - emptyDir: {}
        name: udmrepo
    extraVolumeMounts:
      - mountPath: /nonexistent
        name: udmrepo

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    supplementalGroups:
      - 65534
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
