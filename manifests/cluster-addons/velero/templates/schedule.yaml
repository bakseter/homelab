apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: nightly
  namespace: velero
spec:
  schedule: '54 */1 * * *' # TODO: change
  template:
    ttl: 168h
    storageLocation: default
    snapshotMoveData: true
    includedResources:
      - persistentvolumeclaims
      - persistentvolumes
      - sealedsecrets
    labelSelector:
      matchLabels:
        bakseter.net/backup: 'true'
