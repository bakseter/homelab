longhorn:
  preUpgradeChecker:
    jobEnabled: false
    upgradeVersionCheck: false # hotfix

  defaultSettings:
    defaultDataPath: /var/lib/longhorn
    createDefaultDiskLabeledNodes: true
    snapshotDataIntegrity: enabled

  defaultBackupStore:
    backupTarget: s3://bakseter-homelab-longhorn@hel1/
    backupTargetCredentialSecret: longhorn-backup-secret
    pollInterval: 600

  persistence:
    defaultClassReplicaCount: 2

  networkPolicies:
    enabled: true

  ingress:
    enabled: true
    ingressClassName: tailscale
    host: longhorn
    tls:
      - hosts:
          - longhorn

  # Hotfix: https://github.com/longhorn/longhorn/releases/tag/v1.11.0
  image:
    longhorn:
      manager:
        tag: v1.11.0-hotfix-1
      instanceManager:
        tag: v1.11.0-hotfix-1
