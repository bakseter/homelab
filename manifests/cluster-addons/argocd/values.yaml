argo-cd:
  global:
    revisionHistoryLimit: 5
    networkPolicy:
      create: true

  configs:
    repositories:
      argocd:
        url: https://github.com/bakseter/homelab.git

    params:
      server.insecure: true
      controller.diff.server.side: 'true'

    cm:
      url: https://argocd.sre.bakseter.net

      admin.enabled: false
      dex.config: |
        connectors:
        - type: oidc
          id: authentik
          name: Authentik
          config:
            issuer: https://authentik.bakseter.no/application/o/argocd/
            clientID: argocd
            clientSecret: $argocd-authentik:clientSecret
            insecureEnableGroups: true
            getUserInfo: true
            userNameKey: preferred_username
            scopes:
              - openid
              - profile
              - email

      kustomize.buildOptions: --enable-helm

    rbac:
      scopes: '[groups, email]'
      policy.default: ''
      policy.csv: |
        p, role:org-admin, *, get, *, allow
        p, role:org-admin, applications, sync, *, allow
        p, role:org-admin, applicationsets, sync, *, allow
        g, argocd-admins, role:org-admin

    dex:
      enabled: true

  notifications:
    enabled: false

  redis-ha:
    enabled: false

  controller:
    replicas: 1

    resouces:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 2
        memory: 2Gi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack

  server:
    replicas: 1

    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 512Mi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack

    httproute:
      enabled: true

      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: bakseter-net-gateway-sre
          namespace: tailscale

      hostnames:
        - argocd.sre.bakseter.net

      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /

  repoServer:
    replicas: 1

    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack

  applicationSet:
    replicas: 1

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack

  dex:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 512Mi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
