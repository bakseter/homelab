argo-cd:
  global:
    revisionHistoryLimit: 5
    networkPolicy:
      create: true

  configs:
    repositories:
      argocd:
        url: https://github.com/bakseter/homelab.git

    params:
      server.insecure: true

    cm:
      url: https://argocd.tail79d70a.ts.net

      admin.enabled: false
      dex.config: |
        connectors:
          - type: authproxy
            id: tailscale
            name: Proxy
            config:
              userHeader: Tailscale-User-Login

      resource.exclusions: |
        - apiGroups:
            - ''
          kinds:
            - Secret
          clusters:
            - '*'
          namespaces:
            - kube-system
          name: cilium-ca

        - apiGroups:
            - ''
          kinds:
            - Secret
          clusters:
            - '*'
          namespaces:
            - kube-system
          name: hubble-relay-client-certs

        - apiGroups:
            - ''
          kinds:
            - Secret
          clusters:
            - '*'
          namespaces:
            - kube-system
          name: hubble-server-certs

    rbac:
      scopes: '[groups, email]'
      policy.default: ''
      policy.csv: |
        p, role:org-admin, *, get, *, allow
        p, role:org-admin, applications, sync, *, allow
        p, role:org-admin, applicationsets, sync, *, allow
        g, bakseter@github, role:org-admin

    dex:
      enabled: true

  notifications:
    enabled: false

  redis-ha:
    enabled: true

  controller:
    replicas: 1
    resouces:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi

  server:
    replicas: 2
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 320Mi

  repoServer:
    replicas: 2
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  applicationSet:
    replicas: 2
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi

  dex:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
