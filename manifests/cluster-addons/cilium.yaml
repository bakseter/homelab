apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  destination:
    namespace: kube-system
    name: admin@homelab
  project: default
  source:
    path: manifests/cluster-addons/cilium
    repoURL: https://github.com/bakseter/homelab.git
    targetRevision: HEAD
  ignoreDifferences:
    - group: ''
      kind: Secret
      name: cilium-ca
      namespace: kube-system
      jsonPointers:
        - /data

    - group: ''
      kind: Secret
      name: hubble-server-certs
      namespace: kube-system
      jsonPointers:
        - /data

    - group: ''
      kind: Secret
      name: hubble-relay-client-certs
      namespace: kube-system
      jsonPointers:
        - /data
  syncPolicy:
    automated:
       prune: true
       selfHeal: true
    syncOptions:
      - ServerSideApply=true
