apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      containers:
        - name: vllm
          image: public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:v0.19.0@sha256:afb39fca138b51d019d986229d546531b45a2a3deb73bcf59bd42406e13fbba0
          command: ['/bin/sh', '-c']
          args: ['vllm serve meta-llama/Llama-3.2-1B-Instruct']
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: token
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: llama-storage
              mountPath: /root/.cache/huggingface
      volumes:
        - name: llama-storage
          persistentVolumeClaim:
            claimName: vllm-models
