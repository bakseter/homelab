vaultwarden:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    supplementalGroups:
      - 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  domain: https://vaultwarden.tail79d70a.ts.net

  image:
    registry: docker.io
    repository: vaultwarden/server
    tag: 1.35.8-alpine@sha256:f5d0368ee8d29b62afbf9b8e34dcd074e3e22a2973a82f947d2c3260f9e2389a

  ingress:
    enabled: true

    class: tailscale
    hostname: vaultwarden

  database:
    type: postgresql
    existingSecret: vaultwarden-database-app
    existingSecretKey: uri

  replicas: 0 # TODO: remove
