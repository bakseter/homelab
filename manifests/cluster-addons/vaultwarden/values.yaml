vaultwarden:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    supplementalGroups:
      - 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  domain: https://vaultwarden.tail79d70a.ts.net

  image:
    registry: docker.io
    repository: vaultwarden/server
    tag: 1.36.0-alpine@sha256:d3531610b486905943706b235e97159331801c6856e1367a93a5905e2b40f204

  ingress:
    enabled: true

    class: tailscale
    hostname: vaultwarden

  database:
    type: postgresql
    existingSecret: vaultwarden-database-app
    existingSecretKey: uri

  replicas: 0 # TODO: remove
