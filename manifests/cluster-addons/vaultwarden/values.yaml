vaultwarden:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    supplementalGroups:
      - 1001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  domain: https://vaultwarden.tail79d70a.ts.net

  ingress:
    enabled: true

    class: tailscale
    hostname: vaultwarden
