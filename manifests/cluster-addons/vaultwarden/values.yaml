podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  supplementalGroups:
    - 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

domain: https://vaultwarden.bakseter.no

image:
  registry: docker.io
  repository: vaultwarden/server
  tag: 1.36.0-alpine@sha256:d3531610b486905943706b235e97159331801c6856e1367a93a5905e2b40f204

storage:
  data:
    name: vaultwarden-data
    size: 1Gi
    class: longhorn-encrypted
    path: /data
    accessMode: ReadWriteOnce

  attachments:
    name: vaultwarden-files
    size: 1Gi
    class: longhorn-encrypted
    path: /files
    accessMode: ReadWriteOnce

database:
  type: postgresql
  existingSecret: vaultwarden-database-app
  existingSecretKey: uri

sso:
  enabled: true
  onlySSO: true
  enforceSSO: true
  pkce: false
  ignoreEmailVerification: true
  authority: https://authentik.bakseter.no/application/o/vaultwarden/
  scopes: 'openid profile email offline_access'
  existingSecret: vaultwarden-sso-secret
  clientId:
    existingSecretKey: clientId
  clientSecret:
    existingSecretKey: clientSecret
