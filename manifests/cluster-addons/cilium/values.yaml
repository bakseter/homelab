cilium:
  ipam:
    mode: kubernetes

  kubeProxyReplacement: true

  securityContext:
    capabilities:
      ciliumAgent:
        - CHOWN
        - KILL
        - NET_ADMIN
        - NET_RAW
        - IPC_LOCK
        - SYS_ADMIN
        - SYS_RESOURCE
        - DAC_OVERRIDE
        - FOWNER
        - SETGID
        - SETUID
      cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE

  cgroup:
    autoMount:
      enabled: false

    hostRoot: /sys/fs/cgroup

  k8sServicePort: 7445

  socketLB:
    hostNamespaceOnly: true

  hubble:
    relay:
      enabled: true

    ui:
      enabled: true

    metrics:
      enabled:
        - dns:query;ignoreAAAA
        - drop
        - tcp
        - flow
        - icmp
        - http

      serviceMonitor:
        enabled: true
        labels:
          release: monitoring

      dashboards:
        enabled: true
