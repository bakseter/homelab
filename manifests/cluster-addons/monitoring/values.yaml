kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      scrapeInterval: 30s

      retention: 168h
      retentionSize: 20GB # https://prometheus.io/docs/prometheus/latest/storage/#right-sizing-retention-size

      serviceMonitorNamespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: In
            values:
              - monitoring
              - mandagsmiddag

      storageSpec:
        volumeClaimTemplate:
          metadata:
            labels:
              recurring-job.longhorn.io/source: enabled
              recurring-job-group.longhorn.io/fstrim: enabled
          spec:
            accessModes: ['ReadWriteOnce']
            resources:
              requests:
                storage: 25Gi

      metricRelabelings:
        - sourceLabels: [__name__]
          regex: '.*_bucket'
          action: drop

  defaultRules:
    create: true
    reules:
      alertmanager: false
      etcd: false
      kubeControllerManager: false
      kubeScheduler: false
      kubeProxy: false
      windows: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false

  grafana:
    enabled: false
    forceDeployDashboards: true

  alertmanager:
    enabled: false

  kubeEtcd:
    enabled: false

  kubeControllerManager:
    enabled: false

  kubeScheduler:
    enabled: false

  kubeProxy:
    enabled: false

loki:
  loki:
    auth_enabled: false

    storage:
      type: s3

      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler

      s3:
        endpoint: minio.minio.svc.cluster.local:9000
        access_key_id: minio
        secret_access_key: minio123
        insecure: true

    commonConfig:
      replication_factor: 1

    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    ingester:
      chunk_encoding: snappy
      max_chunk_age: 4h

    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 48h

    ruler:
      enable_api: true

    querier:
      max_concurrent: 4

    pattern_ingester:
      enabled: true

  minio:
    enabled: true

    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

  lokiCanary:
    enabled: true
    push: false

  resultsCache:
    enabled: false

  deploymentMode: Distributed

  ingester:
    replicas: 3
    zoneAwareReplication:
      enabled: false

  querier:
    replicas: 3 # Improve query performance via parallelism
    maxUnavailable: 2

  queryFrontend:
    replicas: 2
    maxUnavailable: 1

  queryScheduler:
    replicas: 2

  distributor:
    replicas: 3
    maxUnavailable: 2

  compactor:
    replicas: 1
    working_directory: /data/retention
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 5

  indexGateway:
    replicas: 2
    maxUnavailable: 1

  chunksCache:
    enabled: false
    # default is 500MB, with limited memory keep this smaller
    writebackSizeLimit: 100MB

  gateway:
    enabled: true

  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  singleBinary:
    replicas: 0

alloy:
  global:
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

  alloy:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    configMap:
      content: |
        loki.write "default" {
          endpoint {
            url = "http://monitoring-loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
          }
        }

        local.file_match "node_logs" {
          path_targets = [{
            __path__  = "/var/log/syslog",
            job       = "node/syslog",
            node_name = sys.env("HOSTNAME"),
            cluster   = "homelab",
          }]
        }

        loki.source.file "node_logs" {
          targets    = local.file_match.node_logs.targets
          forward_to = [loki.write.default.receiver]
        }

        discovery.kubernetes "pod" {
          role = "pod"

          namespaces {
            names = [
              "bakseter-net",
              "cloudflared",
              "immich",
              "jellyfin",
              "longhorn-system",
              "mandagsmiddag",
              "tailscale",
              "traefik",
            ]
          }

          selectors {
            role  = "pod"
            label = "logs.bakseter.net/scrape=true"
          }
        }

        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pod.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            action        = "replace"
            target_label  = "namespace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            action        = "replace"
            target_label  = "pod"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            action        = "replace"
            target_label  = "container"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            action        = "replace"
            target_label  = "node_name"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            action        = "replace"
            target_label  = "app"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
            action        = "replace"
            target_label  = "job"
            separator     = "/"
            replacement   = "$1/$2"
          }
        }

        loki.source.kubernetes "pod_logs" {
          targets    = discovery.relabel.pod_logs.output
          forward_to = [loki.process.pod_logs.receiver]
        }

        loki.process "pod_logs" {
          stage.static_labels {
            values = {
              cluster = "homelab",
              source  = "kubernetes",
            }
          }

          forward_to = [loki.write.default.receiver]
        }

        loki.source.kubernetes_events "cluster_events" {
          job_name   = "integrations/kubernetes/eventhandler"
          log_format = "logfmt"
          forward_to = [loki.process.cluster_events.receiver]
        }

        loki.process "cluster_events" {
          stage.static_labels {
            values = {
              cluster = "homelab",
              source  = "k8s_events",
            }
          }

          forward_to = [loki.write.default.receiver]
        }

        otelcol.receiver.otlp "apps" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }

          http {
            endpoint = "0.0.0.0:4318"
          }

          output {
            logs = [otelcol.processor.batch.apps.input]
          }
        }

        otelcol.processor.batch "apps" {
          output {
            logs = [otelcol.exporter.loki.apps.input]
          }
        }

        otelcol.exporter.loki "apps" {
          forward_to = [loki.process.otel_logs.receiver]
        }

        loki.process "otel_logs" {
          stage.static_labels {
            values = {
              cluster = "homelab",
              source  = "otlp",
            }
          }

          stage.labels {
            values = {
              service_name = "service.name",
            }
          }

          forward_to = [loki.write.default.receiver]
        }

  configReloader:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65535
      runAsGroup: 65535

  service:
    enabled: true
    ports:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
      - name: otlp-http
        port: 4318
        targetPort: 4318

grafana-operator:
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
