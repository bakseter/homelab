kube-prometheus-stack:
  prometheus:
    ingress:
      enabled: true
      ingressClassName: tailscale
      hosts:
        - prometheus
      tls:
        - hosts:
            - prometheus

    prometheusSpec:
      scrapeInterval: 60s

      retention: 14d
      retentionSize: 40GB # https://prometheus.io/docs/prometheus/latest/storage/#right-sizing-retention-size

      image:
        registry: quay.io
        repository: prometheus/prometheus
        tag: v3.11.2-distroless
        sha: abe6a0652b5ca58b6c2d377483485678c8c472671deed21536f53b59d795c032

      externalUrl: https://prometheus.tail79d70a.ts.net

      serviceMonitorNamespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: In
            values:
              - authentik
              - falco
              - kube-system # cilium hubble
              - longhorn-system
              - monitoring
              - mandagsmiddag
              - spenn

      storageSpec:
        volumeClaimTemplate:
          metadata:
            labels:
              recurring-job.longhorn.io/source: enabled
              recurring-job-group.longhorn.io/fstrim: enabled
          spec:
            accessModes: ['ReadWriteOnce']
            resources:
              requests:
                storage: 50Gi

      metricRelabelings:
        - sourceLabels: [__name__]
          regex: '.*_bucket'
          action: drop

  defaultRules:
    create: true
    rules:
      alertmanager: false
      etcd: false
      kubeControllerManager: false
      kubeScheduler: false
      kubeProxy: false
      windows: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false

  alertmanager:
    enabled: true

    alertmanagerSpec:
      image:
        registry: quay.io
        repository: prometheus/alertmanager
        tag: v0.32.0
        sha: 58e117eabccebbff04e6643a3432d6315a2cc3a8c24ab5849bc628886bf08857

      externalUrl: https://alertmanager.tail79d70a.ts.net
      secrets:
        - alertmanager-pushover

    config:
      global:
        resolve_timeout: 5m

      route:
        receiver: pushover
        group_by: ['alertname', 'namespace']
        routes:
          - matchers:
              - alertname=~"Watchdog|InfoInhibitor|NodeSystemSaturation"
            receiver: 'null'

      receivers:
        - name: 'null'
        - name: pushover
          pushover_configs:
            - user_key_file: /etc/alertmanager/secrets/alertmanager-pushover/user_key
              token_file: /etc/alertmanager/secrets/alertmanager-pushover/token
              title: '{{ .CommonAnnotations.summary }}'
              message: '{{ .CommonAnnotations.description }}'
              send_resolved: true

    ingress:
      enabled: true
      ingressClassName: tailscale
      hosts:
        - alertmanager
      tls:
        - hosts:
            - alertmanager

  grafana:
    enabled: false
    forceDeployDashboards: true

  coreDns:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false

loki:
  loki:
    auth_enabled: false

    storage:
      type: s3

      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler

      s3:
        endpoint: minio.minio.svc.cluster.local:9000
        access_key_id: minio
        secret_access_key: minio123
        insecure: true

    commonConfig:
      replication_factor: 1

    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    ingester:
      chunk_encoding: snappy

    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 720h

    ruler:
      enable_api: true

    querier:
      max_concurrent: 4

    pattern_ingester:
      enabled: true

  minio:
    enabled: true

    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

  lokiCanary:
    enabled: true
    push: false

  resultsCache:
    enabled: false

  deploymentMode: Distributed

  ingester:
    replicas: 3
    zoneAwareReplication:
      enabled: false

  querier:
    replicas: 3 # Improve query performance via parallelism
    maxUnavailable: 2

  queryFrontend:
    replicas: 2
    maxUnavailable: 1

  queryScheduler:
    replicas: 2

  distributor:
    replicas: 3
    maxUnavailable: 2

  compactor:
    replicas: 1
    working_directory: /data/retention
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 5

  indexGateway:
    replicas: 2
    maxUnavailable: 1

  chunksCache:
    enabled: false
    # default is 500MB, with limited memory keep this smaller
    writebackSizeLimit: 250MB

  gateway:
    enabled: true

  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  singleBinary:
    replicas: 0

alloy:
  image:
    registry: docker.io
    repository: grafana/alloy
    tag: v1.16.0 # overriden by digest, but left for clarity
    digest: 6e00cf7c5a692ff5f24844529416ed017d76fce922f8199004e73d5eca46b6b8

  global:
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

  configReloader:
    image:
      registry: quay.io
      repository: prometheus-operator/prometheus-config-reloader
      tag: v0.81.0 # overriden by digest, but left for clarity
      digest: 959d47672fbff2776a04ec62b8afcec89e8c036af84dc5fade50019dab212746

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65535
      runAsGroup: 65535

  alloy:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP

    enableReporting: false

    configMap:
      content: |
        loki.write "default" {
          endpoint {
            url = "http://monitoring-loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
          }
        }

        local.file_match "node_logs" {
          path_targets = [{
            __path__  = "/var/log/syslog",
            job       = "node/syslog",
            node_name = sys.env("HOSTNAME"),
            cluster   = "homelab",
          }]
        }

        loki.source.file "node_logs" {
          targets    = local.file_match.node_logs.targets
          forward_to = [loki.write.default.receiver]
        }

        discovery.kubernetes "pod" {
          role = "pod"

          namespaces {
            names = [
              "authentik",
              "bakseter-net",
              "cloudflared",
              "immich",
              "jellyfin",
              "longhorn-system",
              "mandagsmiddag",
              "tailscale",
              "traefik",
            ]
          }
        }

        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pod.targets

          rule {
            source_labels = ["__meta_kubernetes_pod_label_logs_bakseter_net_scrape"]
            regex         = "false"
            action        = "drop"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            action        = "replace"
            target_label  = "namespace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            action        = "replace"
            target_label  = "pod"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            action        = "replace"
            target_label  = "container"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            action        = "replace"
            target_label  = "node_name"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            action        = "replace"
            target_label  = "app"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
            action        = "replace"
            target_label  = "job"
            separator     = "/"
            replacement   = "$1/$2"
          }
        }

        loki.source.kubernetes "pod_logs" {
          targets    = discovery.relabel.pod_logs.output
          forward_to = [loki.process.pod_logs.receiver]
        }

        loki.process "pod_logs" {
          stage.static_labels {
            values = {
              cluster = "homelab",
              source  = "kubernetes",
            }
          }

          forward_to = [loki.write.default.receiver]
        }

        loki.source.kubernetes_events "cluster_events" {
          job_name   = "integrations/kubernetes/eventhandler"
          log_format = "logfmt"
          forward_to = [loki.process.cluster_events.receiver]
        }

        loki.process "cluster_events" {
          stage.static_labels {
            values = {
              cluster = "homelab",
              source  = "k8s_events",
            }
          }

          forward_to = [loki.write.default.receiver]
        }

        otelcol.receiver.otlp "apps" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }

          output {
            logs = [otelcol.processor.attributes.otlp_hints.input]
          }
        }

        otelcol.processor.attributes "otlp_hints" {
          action {
            key    = "loki.resource.labels"
            action = "insert"
            value  = "service.name,service.namespace"
          }

          output {
            logs = [otelcol.processor.batch.apps.input]
          }
        }

        otelcol.processor.batch "apps" {
          output {
            logs = [otelcol.exporter.loki.apps.input]
          }
        }

        otelcol.exporter.loki "apps" {
          forward_to = [loki.process.otel_logs.receiver]
        }

        loki.process "otel_logs" {
          stage.static_labels {
            values = {
              cluster = "homelab",
              source  = "otlp",
            }
          }

          forward_to = [loki.write.default.receiver]
        }

grafana-operator:
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
