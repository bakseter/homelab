apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: http-probes
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  jobName: http
  interval: 60s
  scrapeTimeout: 30s
  module: http_2xx
  prober:
    url: prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - https://authentik.bakseter.net
        - https://bakseter.net
        - https://mandagsmiddag.no
      labels:
        probe_type: http
  metricRelabelings:
    - sourceLabels: [instance]
      regex: 'https?://([^.]+)\..*'
      targetLabel: instance
      replacement: '$1'
      action: replace
---
