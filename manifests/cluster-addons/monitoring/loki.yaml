apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  destination:
    namespace: monitoring
    name: admin@homelab
  project: default
  source:
    path: manifests/cluster-addons/monitoring/loki
    repoURL: https://github.com/bakseter/homelab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
       prune: true
       selfHeal: true
    syncOptions:
      - ServerSideApply=true
