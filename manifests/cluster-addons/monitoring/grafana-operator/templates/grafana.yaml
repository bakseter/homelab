apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  httpRoute:
    spec:
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: bakseter-net-gateway-int
          namespace: tailscale

      hostnames:
        - grafana.int.bakseter.net

      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - group: ''
              kind: Service
              name: grafana-service
              port: 3000
  deployment:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
            supplementalGroups:
              - 65534
          containers:
            - name: grafana
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: GF_INSTALL_PLUGINS
                  value: 'grafana-lokiexplore-app,grafana-metricsdrilldown-app'
  config:
    log:
      mode: 'console'
    server:
      domain: grafana.tail79d70a.ts.net
      root_url: https://grafana.tail79d70a.ts.net
