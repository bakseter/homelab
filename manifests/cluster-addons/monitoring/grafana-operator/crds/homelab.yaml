            {
              "expr": "sum(longhorn_volume_actual_size_bytes) / sum(longhorn_volume_capacity_bytes) * 100",
              "legendFormat": "Longhorn %",
              "refId": "A"
            }
          ],
          "title": "Longhorn Usage",
          "type": "gauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Consolidated cluster health alerts: ArgoCD app counts, crash-looping pods, Longhorn volume health, soonest cert expiry, and busiest PVC — all in one strip.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  }
                ]
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Degraded Apps"
                },
                "properties": [
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "green",
                          "value": 0
                        },
                        {
                          "color": "red",
                          "value": 1
                        }
                      ]
                    }
                  },
                  {
                    "id": "color",
                    "value": {
                      "mode": "thresholds"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "OutOfSync Apps"
