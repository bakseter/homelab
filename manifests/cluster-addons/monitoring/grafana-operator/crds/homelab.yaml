            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Homelab single-pane-of-glass: cluster gauges, consolidated alert strip, per-node CPU/mem bars with sparklines, PVC usage, Argo CD app chips, service uptime, TLS expiry bars, and log error rate.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": 0,
      "links": [
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": false,
          "keepTime": true,
          "tags": [],
          "targetBlank": true,
          "title": "Argo CD",
          "tooltip": "",
          "type": "link",
          "url": "https://argocd.sre.bakseter.net"
        },
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": false,
          "keepTime": true,
          "tags": [],
          "targetBlank": true,
          "title": "Alertmanager",
          "tooltip": "",
          "type": "link",
          "url": "https://alertmanager.int.bakseter.net"
        },
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": false,
          "keepTime": true,
          "tags": [],
          "targetBlank": true,
          "title": "Prometheus",
          "tooltip": "",
          "type": "link",
          "url": "https://prometheus.int.bakseter.net"
        },
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": false,
          "keepTime": true,
          "tags": [],
          "targetBlank": true,
          "title": "Longhorn",
          "tooltip": "",
          "type": "link",
          "url": "https://longhorn.int.bakseter.net"
        }
      ],
