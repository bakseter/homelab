                "properties": [
                  {
                    "id": "unit",
                    "value": "percent"
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "green",
                          "value": 0
                        },
                        {
                          "color": "orange",
                          "value": 80
                        },
                        {
                          "color": "red",
                          "value": 95
                        }
                      ]
                    }
                  },
                  {
                    "id": "color",
                    "value": {
                      "mode": "thresholds"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Soonest Cert (d)"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "d"
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "red",
                          "value": 0
                        },
                        {
                          "color": "orange",
                          "value": 7
                        },
                        {
                          "color": "yellow",
                          "value": 21
                        },
                        {
                          "color": "green",
                          "value": 30
                        }
                      ]
                    }
                  },
                  {
                    "id": "color",
                    "value": {
                      "mode": "thresholds"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Longhorn Volumes"
                },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "options": {
                          "0": {
                            "color": "red",
                            "index": 0,
                            "text": "Faulted"
                          },
                          "1": {
                            "color": "green",
                            "index": 1,
                            "text": "Healthy"
                          }
                        },
                        "type": "value"
                      }
                    ]
                  },
                  {
                    "id": "color",
                    "value": {
                      "mode": "thresholds"
                    }
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "red",
                          "value": 0
                        },
                        {
                          "color": "green",
                          "value": 1
                        }
                      ]
                    }
                  }
                ]
              }
            ]
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 16,
            "y": 1
          },
          "id": 50,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "text": {},
            "textMode": "value_and_name",
            "wideLayout": true
          },
          "pluginVersion": "12.3.3",
          "targets": [
            {
              "expr": "count(argocd_app_info{health_status=\"Healthy\"})",
              "instant": true,
              "legendFormat": "Healthy Apps",
              "refId": "A"
            },
            {
              "expr": "count(argocd_app_info{health_status=\"Degraded\"}) or vector(0)",
              "instant": true,
              "legendFormat": "Degraded Apps",
              "refId": "B"
            },
            {
              "expr": "count(argocd_app_info{sync_status=\"OutOfSync\"}) or vector(0)",
              "instant": true,
              "legendFormat": "OutOfSync Apps",
              "refId": "C"
            },
            {
              "expr": "count(increase(kube_pod_container_status_restarts_total{namespace!~\"kube-system|monitoring\"}[1h]) > 3) or vector(0)",
              "instant": true,
              "legendFormat": "Crash Looping",
              "refId": "D"
            },
            {
              "expr": "max(kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100)",
              "instant": true,
              "legendFormat": "Busiest PVC %",
              "refId": "E"
            },
            {
              "expr": "min((probe_ssl_earliest_cert_expiry{job=\"tls\"} - time()) / 86400)",
              "instant": true,
              "legendFormat": "Soonest Cert (d)",
              "refId": "F"
            },
            {
              "expr": "min(longhorn_volume_robustness{state=\"healthy\"} == 1) or vector(0)",
              "instant": true,
              "legendFormat": "Longhorn Volumes",
              "refId": "G"
            }
          ],
