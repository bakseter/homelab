apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: proxmox-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: proxmox.temperature
      rules:
        - alert: ProxmoxHighCPUTemp
          expr: |
            avg by (instance) (
              node_hwmon_temp_celsius{job="node-exporter-proxmox"}
            ) > 75
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'High CPU temperature on {{ $labels.instance }}'
            description: 'CPU temperature is {{ $value | humanize }}°C on {{ $labels.instance }}'

        - alert: ProxmoxCriticalCPUTemp
          expr: |
            avg by (instance) (
              node_hwmon_temp_celsius{job="node-exporter-proxmox"}
            ) > 85
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: 'Critical CPU temperature on {{ $labels.instance }}'
            description: 'CPU temperature is {{ $value | humanize }}°C on {{ $labels.instance }}'

        - alert: ProxmoxTempNearCritical
          expr: |
            (
              avg by (instance) (
                node_hwmon_temp_celsius{job="node-exporter-proxmox"}
              )
              /
              avg by (instance) (
                node_hwmon_temp_crit_celsius{job="node-exporter-proxmox"}
              )
            ) > 0.90
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: 'Temperature near critical threshold on {{ $labels.instance }}'
            description: '{{ $labels.instance }} is at {{ $value | humanizePercentage }} of its critical threshold'

    - name: proxmox.cpu
      rules:
        - alert: ProxmoxHighCPUUsage
          expr: |
            1 - avg by (instance) (
              rate(node_cpu_seconds_total{job="node-exporter-proxmox", mode="idle"}[5m])
            ) > 0.90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'High CPU usage on {{ $labels.instance }}'
            description: 'CPU usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}'

        - alert: ProxmoxHighCPUSteal
          expr: |
            avg by (instance) (
              rate(node_cpu_seconds_total{job="node-exporter-proxmox", mode="steal"}[5m])
            ) > 0.10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'High CPU steal on {{ $labels.instance }}'
            description: 'CPU steal is {{ $value | humanizePercentage }} on {{ $labels.instance }} — VMs are being starved of CPU'

    - name: proxmox.memory
      rules:
        - alert: ProxmoxHighMemoryUsage
          expr: |
            100 * (1 - node_memory_MemAvailable_bytes{job="node-exporter-proxmox"}
            / node_memory_MemTotal_bytes{job="node-exporter-proxmox"}) > 90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'High memory usage on {{ $labels.instance }}'
            description: 'Memory usage is {{ $value | humanize }}% on {{ $labels.instance }}'

        - alert: ProxmoxCriticalMemoryUsage
          expr: |
            100 * (1 - node_memory_MemAvailable_bytes{job="node-exporter-proxmox"}
            / node_memory_MemTotal_bytes{job="node-exporter-proxmox"}) > 95
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: 'Critical memory usage on {{ $labels.instance }}'
            description: 'Memory usage is {{ $value | humanize }}% on {{ $labels.instance }}'

    - name: proxmox.availability
      rules:
        - alert: ProxmoxNodeExporterDown
          expr: |
            absent(
              node_hwmon_temp_celsius{job="node-exporter-proxmox"}
            )
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: 'Proxmox node-exporter metrics missing'
            description: 'No metrics from node-exporter-proxmox — node-exporter may be down'
