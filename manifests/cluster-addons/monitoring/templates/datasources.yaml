apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki
spec:
  instanceSelector:
    matchLabels:
      dashboards: 'grafana'
  allowCrossNamespaceImport: true
  datasource:
    name: loki
    uid: loki
    type: loki
    access: proxy
    basicAuth: false
    url: http://monitoring-loki-gateway.monitoring.svc.cluster.local
    isDefault: false
    jsonData:
      httpMethod: GET
      maxLines: 1000
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus
spec:
  instanceSelector:
    matchLabels:
      dashboards: 'grafana'
  allowCrossNamespaceImport: true
  datasource:
    name: prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    basicAuth: false
    url: http://prometheus-operated.monitoring.svc.cluster.local:9090
    isDefault: false
