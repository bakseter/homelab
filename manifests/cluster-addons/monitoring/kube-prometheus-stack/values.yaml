kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      scrapeInterval: 60s

      retention: 60d
      retentionSize: 65GB # https://prometheus.io/docs/prometheus/latest/storage/#right-sizing-retention-size

      tsdb:
        outOfOrderTimeWindow: 10m

      image:
        registry: quay.io
        repository: prometheus/prometheus
        tag: v3.12.0-distroless
        sha: f39df5334dee301b885f77e0ff1159f5d8a43bf9db518f885544594799a1e3c2

      externalUrl: https://prometheus.int.bakseter.net

      serviceMonitorNamespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: In
            values:
              - argocd
              - authentik
              - cert-manager
              - cloudflared
              - cnpg-system
              - external-dns
              - kube-system # cilium hubble
              - longhorn-system
              - monitoring
              - mandagsmiddag
              - tailscale

      podMonitorNamespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: In
            values:
              - amex
              - authentik
              - immich
              - mandagsmiddag
              - media
              - vaultwarden

      probeNamespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: In
            values:
              - monitoring

      storageSpec:
        volumeClaimTemplate:
          metadata:
            labels:
              recurring-job.longhorn.io/source: enabled
              recurring-job-group.longhorn.io/fstrim: enabled
          spec:
            accessModes: ['ReadWriteOnce']
            resources:
              requests:
                storage: 75Gi

      metricRelabelings:
        - sourceLabels: [__name__]
          regex: '.*_bucket'
          action: drop

      additionalScrapeConfigs:
        - job_name: proxmox-nodes
          static_configs:
            - targets:
                - 192.168.10.20:9100
              labels:
                hostname: m715q
            - targets:
                - 192.168.10.21:9100
              labels:
                hostname: m715q2
            - targets:
                - 192.168.10.22:9100
              labels:
                hostname: m720q
            - targets:
                - 192.168.10.23:9100
              labels:
                hostname: m920q
            - targets:
                - 192.168.10.24:9100
              labels:
                hostname: m70qg3
          relabel_configs:
            - target_label: job
              replacement: node-exporter-proxmox
            - source_labels: [hostname]
              target_label: instance
            - regex: hostname
              action: labeldrop

  defaultRules:
    create: true
    rules:
      kubeControllerManager: false
      kubeProxy: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false
      windows: false

  alertmanager:
    enabled: true

    alertmanagerSpec:
      image:
        registry: quay.io
        repository: prometheus/alertmanager
        tag: v0.33.0
        sha: af26fbe4dd1886ac0efd7bd55cd9027da262e105b137a376522b7c14c3626e4a

      externalUrl: https://alertmanager.int.bakseter.net
      secrets:
        - alertmanager-pushover

    revisionHistoryLimit: 5

    config:
      global:
        resolve_timeout: 5m
      route:
        receiver: pushover
        group_by: ['alertname', 'namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          - matchers:
              - alertname=~"Watchdog|InfoInhibitor|NodeSystemSaturation"
            receiver: 'null'
      receivers:
        - name: 'null'
        - name: pushover
          pushover_configs:
            - user_key_file: /etc/alertmanager/secrets/alertmanager-pushover/user_key
              token_file: /etc/alertmanager/secrets/alertmanager-pushover/token

              # --- Visual distinction ---
              title: '{{ if eq .Status "firing" }}🔥 FIRING{{ else }}✅ RESOLVED{{ end }} {{ .CommonAnnotations.summary }}'
              message: |
                {{ if eq .Status "firing" }}
                🚨 {{ .Alerts.Firing | len }} alert(s) firing
                {{ range .Alerts.Firing }}• {{ .Labels.alertname }}{{ if .Labels.namespace }} ({{ .Labels.namespace }}){{ end }}
                {{ .Annotations.description }}
                {{ end }}
                {{ else }}
                ✅ {{ .Alerts.Resolved | len }} alert(s) resolved
                {{ range .Alerts.Resolved }}• {{ .Labels.alertname }}{{ if .Labels.namespace }} ({{ .Labels.namespace }}){{ end }}
                {{ end }}
                {{ end }}

              # --- Priority: high for firing, low for resolved ---
              # -2=silent, -1=quiet, 0=normal, 1=high, 2=emergency
              priority: '{{ if eq .Status "firing" }}1{{ else }}-1{{ end }}'

              send_resolved: true
              retry: 30m # for priority=2 (emergency) only; harmless otherwise
              expire: 1h # for priority=2 (emergency) only

  grafana:
    enabled: false
    forceDeployDashboards: true

  kubeEtcd:
    enabled: true

    # https://github.com/siderolabs/talos/discussions/7214#discussioncomment-10345376

    service:
      selector:
        k8s-app: kube-controller-manager # Fix selector for kube-etcd for Talos (set itentionally to kube-controller-manager because all master nodes has the same roles)

    serviceMonitor:
      relabelings: # Add nodename label
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          separator: ;
          regex: ^(.*)$
          targetLabel: nodename
          replacement: $1
          action: replace
      metricRelabelings: # Remove pod label
        - action: labeldrop
          regex: pod

  kube-state-metrics:
    revisionHistoryLimit: 5

    image:
      registry: registry.k8s.io
      repository: kube-state-metrics/kube-state-metrics
      tag: 2.19.1@sha256:85108987d044b18a098126732f98602df408888c0f7d456241f5abefb9744bc1

  prometheusOperator:
    revisionHistoryLimit: 5

    image:
      registry: quay.io
      repository: prometheus-operator/prometheus-operator
      tag: v0.91.0@sha256:9e53e13139218aca79ee000172de73355e9174ef2904585bfad9497fc71aae2d

    prometheusConfigReloader:
      image:
        registry: quay.io
        repository: prometheus-operator/prometheus-config-reloader
        tag: v0.91.0@sha256:7d9e4eea5f1139e602508871f422b0116c60e87c662f3dcd234d5ab60cd0d8c1


  nodeExporter:
    operatingSystems:
      aix:
        enabled: false
      darwin:
        enabled: false

  prometheus-node-exporter:
    image:
      registry: quay.io
      repository: prometheus/node-exporter
      tag: v1.11.1-distroless
      digest: sha256:6112664fd761bb964d8a2d3d0119d6c8402618a89edbb3a43c8f7b4090fb53c9

    prometheus:
      monitor:
        relabelings:
          - sourceLabels: [__meta_kubernetes_node_name]
            targetLabel: instance

  kubeControllerManager:
    enabled: false
  kubeProxy:
    enabled: false
  kubeScheduler:
    enabled: false
