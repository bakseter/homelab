kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      scrapeInterval: 60s

      retention: 30d
      retentionSize: 45GB # https://prometheus.io/docs/prometheus/latest/storage/#right-sizing-retention-size

      image:
        registry: quay.io
        repository: prometheus/prometheus
        tag: v3.11.3-distroless
        sha: cff72a3f49918f41c4b5c8a6174dd8433036bebf7878120da538b3720ba3fa0d

      externalUrl: https://prometheus.int.bakseter.net

      serviceMonitorNamespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: In
            values:
              - authentik
              - kube-system # cilium hubble
              - longhorn-system
              - monitoring
              - mandagsmiddag
              - spenn

      #     podMonitorNamespaceSelector:
      #       matchExpressions:
      #         - key: kubernetes.io/metadata.name
      #           operator: In
      #           values:
      #             - falco

      storageSpec:
        volumeClaimTemplate:
          metadata:
            labels:
              recurring-job.longhorn.io/source: enabled
              recurring-job-group.longhorn.io/fstrim: enabled
          spec:
            accessModes: ['ReadWriteOnce']
            resources:
              requests:
                storage: 50Gi

      metricRelabelings:
        - sourceLabels: [__name__]
          regex: '.*_bucket'
          action: drop

  defaultRules:
    create: true
    rules:
      kubeControllerManager: false
      kubeProxy: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false
      windows: false

  alertmanager:
    enabled: true

    alertmanagerSpec:
      image:
        registry: quay.io
        repository: prometheus/alertmanager
        tag: v0.32.1
        sha: 51a825c2a40acc3e338fdd00d622e01ec090f72be2b3ea46be0839cd47a4d286

      externalUrl: https://alertmanager.int.bakseter.net
      secrets:
        - alertmanager-pushover

    config:
      global:
        resolve_timeout: 5m

      route:
        receiver: pushover
        group_by: ['alertname', 'namespace']
        routes:
          - matchers:
              - alertname=~"Watchdog|InfoInhibitor|NodeSystemSaturation"
            receiver: 'null'

      receivers:
        - name: 'null'
        - name: pushover
          pushover_configs:
            - user_key_file: /etc/alertmanager/secrets/alertmanager-pushover/user_key
              token_file: /etc/alertmanager/secrets/alertmanager-pushover/token
              title: '{{ .CommonAnnotations.summary }}'
              message: '{{ .CommonAnnotations.description }}'
              send_resolved: true

  grafana:
    enabled: false
    forceDeployDashboards: true

  kubeEtcd:
    enabled: true

    # https://github.com/siderolabs/talos/discussions/7214#discussioncomment-10345376

    service:
      selector:
        k8s-app: kube-controller-manager # Fix selector for kube-etcd for Talos (set itentionally to kube-controller-manager because all master nodes has the same roles)

    serviceMonitor:
      relabelings: # Add nodename label
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          separator: ;
          regex: ^(.*)$
          targetLabel: nodename
          replacement: $1
          action: replace
      metricRelabelings: # Remove pod label
        - action: labeldrop
          regex: pod

  kubeControllerManager:
    enabled: false
  kubeProxy:
    enabled: false
  kubeScheduler:
    enabled: false
