alloy:
  controller:
    type: deployment
    replicas: 2
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - alloy
            topologyKey: bakseter.net/physical-node

  image:
    registry: docker.io
    repository: grafana/alloy
    digest: sha256:84b76d56c5943025515438fd45cbb5995386a0260d072c9b671dfd7f539f9c01 # v1.16.3

  global:
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

  # TODO: check if needed
  rbac:
    create: true

  configReloader:
    image:
      registry: quay.io
      repository: prometheus-operator/prometheus-config-reloader
      tag: v0.92.1@sha256:74550ba3e8bf93f47bc574231090d340ae9c01d25cd11ff74799e65f9fdb9a48

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65535
      runAsGroup: 65535

  alloy:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP

      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP

    enableReporting: false

    configMap:
      content: |
        loki.write "default" {
          endpoint {
            url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
          }
        }

        otelcol.exporter.otlphttp "loki" {
          client {
            endpoint = "http://loki-gateway.monitoring.svc.cluster.local/otlp"
          }
        }

        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "tempo.monitoring.svc.cluster.local:4317"

            tls {
              insecure = true
            }
          }
        }

        discovery.kubernetes "pod" {
          role = "pod"

          namespaces {
            names = [
              "amex",
              "argocd",
              "authentik",
              "bakseter-net",
              "cert-manager",
              "cloudflared",
              "cnpg-system",
              "cryptpad",
              "democratic-csi",
              "external-dns",
              "five31",
              "homepage",
              "immich",
              "inteldeviceplugins-system",
              "keel",
              "kube-system",
              "kubelet-serving-cert-approver",
              "longhorn-system",
              "mandagsmiddag",
              "media",
              "monitoring",
              "node-feature-discovery",
              "sealed-secrets",
              "tailscale",
              "technitium",
              "vaultwarden",
              "velero",
            ]
          }
        }

        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pod.targets

          rule {
            source_labels = ["__meta_kubernetes_pod_label_logs_bakseter_net_scrape"]
            regex         = "false"
            action        = "drop"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "k8s_namespace_name"
            action        = "replace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "service_name"
            action        = "replace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "k8s_container_name"
            action        = "replace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "k8s_pod_name"
            action        = "replace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "k8s_node_name"
            action        = "replace"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
            target_label  = "job"
            separator     = "/"
            replacement   = "$1/$2"
            action        = "replace"
          }
        }

        loki.source.kubernetes "pod_logs" {
          targets    = discovery.relabel.pod_logs.output
          forward_to = [loki.process.pod_logs.receiver]
        }

        loki.process "pod_logs" {
          stage.static_labels {
            values = {
              cluster = "homelab",
              source  = "kubernetes",
            }
          }

          forward_to = [loki.write.default.receiver]
        }

        loki.source.kubernetes_events "cluster_events" {
          job_name   = "integrations/kubernetes/eventhandler"
          log_format = "logfmt"
          forward_to = [loki.process.cluster_events.receiver]
        }

        loki.process "cluster_events" {
          stage.static_labels {
            values = {
              cluster = "homelab",
              source  = "k8s_events",
            }
          }

          forward_to = [loki.write.default.receiver]
        }

        otelcol.receiver.otlp "apps" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }

          http {
            endpoint = "0.0.0.0:4318"
          }

          output {
            logs   = [otelcol.processor.k8sattributes.default.input]
            traces = [otelcol.processor.k8sattributes.default.input]
          }
        }

        otelcol.processor.k8sattributes "default" {
          extract {
            metadata = [
              "k8s.namespace.name",
              "k8s.pod.name",
              "k8s.pod.uid",
              "k8s.deployment.name",
              "k8s.node.name",
            ]
          }

          pod_association {
            source {
              from = "connection"
            }
          }

          output {
            logs   = [otelcol.processor.batch.logs.input]
            traces = [otelcol.processor.batch.traces.input]
          }
        }

        otelcol.processor.batch "logs" {
          output {
            logs = [otelcol.exporter.otlphttp.loki.input]
          }
        }

        otelcol.processor.batch "traces" {
          output {
            traces = [otelcol.exporter.otlp.tempo.input]
          }
        }
