apiVersion: batch/v1
kind: Job
metadata:
  name: loki-create-s3-buckets
  namespace: monitoring
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: '-5'
    helm.sh/hook-delete-policy: before-hook-creation
  labels:
    app.kubernetes.io/instance: loki
    app.kubernetes.io/name: create-s3-buckets
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: loki
        app.kubernetes.io/name: create-s3-buckets
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-s3-buckets
          image: amazon/aws-cli:2.36.5@sha256:9e583cf73c17d711a67507d172ae3f2a2cba4789c27f507d0920b854b738aba2
          env:
            - name: AWS_ACCESS_KEY_ID
              value: 'rustfs'
            - name: AWS_SECRET_ACCESS_KEY
              value: 'rustfs'
            - name: AWS_DEFAULT_REGION
              value: 'us-east-1'
          command:
            - /bin/sh
            - -c
            - |
              set -e
              ENDPOINT="http://rustfs-svc.rustfs.svc.cluster.local:9000"
              BUCKETS="loki-chunks loki-ruler loki-admin"

              echo "Testing connectivity..."
              aws --endpoint-url "$ENDPOINT" s3 ls || echo "FATAL: cannot reach endpoint"

              for BUCKET in $BUCKETS; do
                echo "Creating bucket: $BUCKET"
                if aws --endpoint-url "$ENDPOINT" s3api create-bucket --bucket "$BUCKET" 2>&1; then
                  echo "✓ $BUCKET created"
                else
                  echo "checking if $BUCKET already exists..."
                  aws --endpoint-url "$ENDPOINT" s3api head-bucket --bucket "$BUCKET" 2>&1 && \
                    echo "✓ $BUCKET already exists, OK" || \
                    echo "✗ $BUCKET failed and does not exist — real error"
                fi
              done
