loki:
  loki:
    revisionHistoryLimit: 5
    image:
      registry: docker.io
      repository: grafana/loki
      digest: sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86 # 3.7.2

    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage_config:
      aws:
        endpoint: http://loki-rustfs-svc.monitoring.svc.cluster.local:9000
        bucketnames: loki-chunks
        s3forcepathstyle: true
        access_key_id: rustfsloki
        secret_access_key: rustfsloki
        insecure: true

    storage:
      type: s3
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
      s3:
        endpoint: http://loki-rustfs-svc.monitoring.svc.cluster.local:9000
        region: us-east-1
        secretAccessKey: rustfsloki
        accessKeyId: rustfsloki
        signatureVersion: v4
        s3ForcePathStyle: true
        insecure: true
        http_config: {}

    auth_enabled: false

    commonConfig:
      replication_factor: 1

    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

    ingester:
      chunk_encoding: snappy

    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 720h

    ruler:
      enable_api: true

    querier:
      max_concurrent: 4

    pattern_ingester:
      enabled: true

  minio:
    enabled: false

  lokiCanary:
    enabled: true
    revisionHistoryLimit: 5
    image:
      registry: docker.io
      repository: grafana/loki-canary
      digest: sha256:93751140d6c5cdfb3b07587b10ff262861c9b86c0f2935a418b12e0407cf0d0f # 3.7.2
    push: false
    podLabels:
      logs.bakseter.net/scrape: 'false'

  resultsCache:
    enabled: false

  deploymentMode: Distributed

  ingester:
    replicas: 3
    zoneAwareReplication:
      enabled: false

  querier:
    replicas: 3 # Improve query performance via parallelism
    maxUnavailable: 2

  queryFrontend:
    replicas: 2
    maxUnavailable: 1

  queryScheduler:
    replicas: 2

  distributor:
    replicas: 3
    maxUnavailable: 2

  compactor:
    replicas: 1
    working_directory: /data/retention
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 5

  indexGateway:
    replicas: 2
    maxUnavailable: 1

  chunksCache:
    enabled: false
    # default is 500MB, with limited memory keep this smaller
    writebackSizeLimit: 250MB

  gateway:
    enabled: true
    image:
      registry: docker.io
      repository: nginxinc/nginx-unprivileged
      digest: sha256:8122337ed6c475bb486bc9340da453d4599f225e6b920ff0d92ca2267486b9b5 # 1.31-alpine

  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  singleBinary:
    replicas: 0

rustfs:
  image:
    rustfs:
      repository: rustfs/rustfs
      tag: 1.0.0-beta.6@sha256:e620d37756fff072b10bf648c7bb9d370d7e91a928b7e6a5e1ac85bdfb4e4dab
    initImage:
      repository: busybox
      tag: stable@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662

  mode:
    standalone:
      enabled: true

    distributed:
      enabled: false

  replicaCount: 2

  config:
    rustfs:
      log_level: warn

  secret:
    rustfs:
      access_key: rustfsloki
      secret_key: rustfsloki

  storageclass:
    name: longhorn
    dataStorageSize: 20Gi
    logStorageSize: 2Gi

  ingress:
    enabled: false

  podSecurityContext:
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
