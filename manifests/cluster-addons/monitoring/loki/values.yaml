loki:
  loki:
    auth_enabled: false

    storage:
      type: s3

      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler

      s3:
        endpoint: loki-monio-svc.monitoring.svc.cluster.local:9000
        access_key_id: minio
        secret_access_key: minio123
        insecure: true

    commonConfig:
      replication_factor: 1

    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    ingester:
      chunk_encoding: snappy

    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 720h

    ruler:
      enable_api: true

    querier:
      max_concurrent: 4

    pattern_ingester:
      enabled: true

  minio:
    enabled: false

  lokiCanary:
    enabled: true
    push: false

  resultsCache:
    enabled: false

  deploymentMode: Distributed

  ingester:
    replicas: 3
    zoneAwareReplication:
      enabled: false

  querier:
    replicas: 3 # Improve query performance via parallelism
    maxUnavailable: 2

  queryFrontend:
    replicas: 2
    maxUnavailable: 1

  queryScheduler:
    replicas: 2

  distributor:
    replicas: 3
    maxUnavailable: 2

  compactor:
    replicas: 1
    working_directory: /data/retention
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 5

  indexGateway:
    replicas: 2
    maxUnavailable: 1

  chunksCache:
    enabled: false
    # default is 500MB, with limited memory keep this smaller
    writebackSizeLimit: 250MB

  gateway:
    enabled: true

  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  singleBinary:
    replicas: 0

rustfs:
  mode:
    standalone:
      enabled: true

    distributed:
      enabled: false

  storageClass:
    name: longhorn

  ingress:
    enabled: false

  replicaCount: 2
