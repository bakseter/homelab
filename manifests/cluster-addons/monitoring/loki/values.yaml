loki:
  loki:
    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage_config:
      aws:
        endpoint: http://loki-rustfs-svc.monitoring.svc.cluster.local:9000
        bucketnames: loki-chunks
        s3forcepathstyle: true
        access_key_id: rustfsloki
        secret_access_key: rustfsloki
        insecure: true

    storage:
      type: s3
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
      s3:
        endpoint: http://loki-rustfs-svc.monitoring.svc.cluster.local:9000
        region: us-east-1
        secretAccessKey: rustfsloki
        accessKeyId: rustfsloki
        signatureVersion: v4
        s3ForcePathStyle: true
        insecure: true
        http_config: {}

    auth_enabled: false

    commonConfig:
      replication_factor: 1

    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

    ingester:
      chunk_encoding: snappy

    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 720h

    ruler:
      enable_api: true

    querier:
      max_concurrent: 4

    pattern_ingester:
      enabled: true

  minio:
    enabled: false

  lokiCanary:
    enabled: true
    push: false

  resultsCache:
    enabled: false

  deploymentMode: Distributed

  ingester:
    replicas: 3
    zoneAwareReplication:
      enabled: false

  querier:
    replicas: 3 # Improve query performance via parallelism
    maxUnavailable: 2

  queryFrontend:
    replicas: 2
    maxUnavailable: 1

  queryScheduler:
    replicas: 2

  distributor:
    replicas: 3
    maxUnavailable: 2

  compactor:
    replicas: 1
    working_directory: /data/retention
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 5

  indexGateway:
    replicas: 2
    maxUnavailable: 1

  chunksCache:
    enabled: false
    # default is 500MB, with limited memory keep this smaller
    writebackSizeLimit: 250MB

  gateway:
    enabled: true

  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  singleBinary:
    replicas: 0

rustfs:
  mode:
    standalone:
      enabled: true

    distributed:
      enabled: false

  replicaCount: 2

  config:
    rustfs:
      log_level: warn

  secret:
    rustfs:
      access_key: rustfsloki
      secret_key: rustfsloki

  storageclass:
    name: longhorn
    dataStorageSize: 20Gi
    logStorageSize: 2Gi

  ingress:
    enabled: true
    className: tailscale
    hosts:
      - host: rustfs
        paths:
          - path: /
            pathType: Prefix
    tls:
      enabled: true
