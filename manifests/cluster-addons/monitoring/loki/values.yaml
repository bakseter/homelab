loki:
  loki:
    revisionHistoryLimit: 5
    image:
      registry: docker.io
      repository: grafana/loki
      digest: sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86 # 3.7.2

    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage_config:
      aws:
        endpoint: http://rustfs-svc.rustfs.svc.cluster.local:9000
        bucketnames: loki-chunks
        s3forcepathstyle: true
        access_key_id: rustfs
        secret_access_key: rustfs
        insecure: true

    storage:
      type: s3
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
      s3:
        endpoint: http://rustfs-svc.rustfs.svc.cluster.local:9000
        region: us-east-1
        secretAccessKey: rustfs
        accessKeyId: rustfs
        signatureVersion: v4
        s3ForcePathStyle: true
        insecure: true
        http_config: {}

    auth_enabled: false

    commonConfig:
      replication_factor: 1

    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault

    ingester:
      chunk_encoding: snappy

    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 1440h

    ruler:
      enable_api: true

    querier:
      max_concurrent: 4

    pattern_ingester:
      enabled: true

  minio:
    enabled: false

  lokiCanary:
    enabled: false
  test:
    enabled: false

  resultsCache:
    enabled: false

  deploymentMode: Distributed

  ingester:
    replicas: 3
    zoneAwareReplication:
      enabled: false

  querier:
    replicas: 3
    maxUnavailable: 2

  queryFrontend:
    replicas: 2
    maxUnavailable: 1

  queryScheduler:
    replicas: 2

  distributor:
    replicas: 3
    maxUnavailable: 2

  compactor:
    replicas: 1
    working_directory: /data/retention
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 5

  indexGateway:
    replicas: 2
    maxUnavailable: 1

  chunksCache:
    enabled: false
    # default is 500MB, with limited memory keep this smaller
    writebackSizeLimit: 200MB

  gateway:
    enabled: true
    image:
      registry: docker.io
      repository: nginxinc/nginx-unprivileged
      digest: sha256:8122337ed6c475bb486bc9340da453d4599f225e6b920ff0d92ca2267486b9b5 # 1.31-alpine

  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  singleBinary:
    replicas: 0
