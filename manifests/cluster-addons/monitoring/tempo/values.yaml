tempo:
  tempo:
    registry: docker.io
    repository: grafana/tempo
    # tag: ""

    reportingEnabled: false

    retention: 336h # 14 days

    storage:
      trace:
        backend: s3

        s3:
          bucket: tempo
          endpoint: rustfs-svc.rustfs.svc.cluster.local:9000
          access_key: rustfs
          secret_key: rustfs
          insecure: true

    metricsGenerator:
      enabled: true
      remoteWriteUrl: http://prometheus-operated.monitoring.svc.cluster.local:9090/api/v1/write

    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
          # classic + native during migration; needs native-histograms
          # enabled on Prometheus (which you're adding)
          generate_native_histograms: both
          processor:
            span_metrics:
              enable_target_info: true # emits target_info for resource-attr joins
              dimensions: # extra RED-metric labels — keep low-card
                - k8s.namespace.name
                - k8s.deployment.name
                - http.route
            service_graphs:
              dimensions:
                - k8s.namespace.name
