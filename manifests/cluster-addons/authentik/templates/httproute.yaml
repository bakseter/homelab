apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-server
  namespace: authentik
  annotations:
    gethomepage.dev/enabled: 'true'
    gethomepage.dev/description: Auth
    gethomepage.dev/group: Core
    gethomepage.dev/icon: authentik.png
    gethomepage.dev/name: Authentik
    gethomepage.dev/pod-selector: >-
      app.kubernetes.io/instance=authentik,app.kubernetes.io/component=server
spec:
  parentRefs:
    - name: cloudflared-gateway
      namespace: cloudflared
      group: gateway.networking.k8s.io # for argocd diff
      kind: Gateway

  hostnames:
    - authentik.bakseter.net

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: authentik-server
          port: 80
          group: '' # for argocd diff
          kind: Service # for argocd diff
          weight: 1 # for argocd diff
