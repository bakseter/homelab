apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-database
  namespace: authentik
spec:
  instances: 1
  inheritedMetadata:
    labels:
      recurring-job.longhorn.io/source: enabled
      recurring-job-group.longhorn.io/hetzner-backup: enabled
  storage:
    size: 2Gi
  resources:
    requests:
      cpu: 50m
      memory: 320Mi
    limits:
      cpu: 500m
      memory: 1Gi
  bootstrap:
    recovery:
      volumeSnapshots:
        storage:
          name: authentik-database-backup
          kind: PersistentVolumeClaim
          apiGroup: ''
