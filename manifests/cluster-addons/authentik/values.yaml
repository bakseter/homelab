authentik:
  authentik:
    existingSecret:
      secretName: authentik-secret-key

  global:
    revisionHistoryLimit: 5
    image:
      repository: ghcr.io/goauthentik/server
      tag: 2026.5.3
      digest: sha256:377ee38726785f98aafc3665202ad198a366fa979b0f61c0660a9c05e3a9b1b3
    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault
      supplementalGroups:
        - 65534

  prometheus:
    rules:
      enabled: true
      labels:
        release: kube-prometheus-stack

  server:
    replicas: 1

    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/instance: authentik
                app.kubernetes.io/component: server
            topologyKey: bakseter.net/physical-node

    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 2Gi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 60s
        labels:
          release: kube-prometheus-stack

    env:
      - name: AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS
        value: 10.244.0.0/16

      - name: AUTHENTIK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-secret-key
            key: secret-key

      # primary — rw pooler
      - name: AUTHENTIK_POSTGRESQL__HOST
        value: authentik-pooler-rw.authentik.svc.cluster.local

      - name: AUTHENTIK_POSTGRESQL__USER
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: user

      - name: AUTHENTIK_POSTGRESQL__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: password

      - name: AUTHENTIK_POSTGRESQL__NAME
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: dbname

      - name: AUTHENTIK_POSTGRESQL__CONN_MAX_AGE
        value: '0'

      - name: AUTHENTIK_POSTGRESQL__DISABLE_SERVER_SIDE_CURSORS
        value: 'true'

      # read replica 0 — ro pooler (replicas)
      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__HOST
        value: authentik-pooler-ro.authentik.svc.cluster.local

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__USER
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: user

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: password

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__NAME
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: dbname

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__CONN_MAX_AGE
        value: '0'

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__DISABLE_SERVER_SIDE_CURSORS
        value: 'true'

      # read replica 1 — rw pooler (primary also handles reads)
      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__1__HOST
        value: authentik-pooler-rw.authentik.svc.cluster.local

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__1__USER
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: user

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__1__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: password

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__1__NAME
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: dbname

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__1__CONN_MAX_AGE
        value: '0'

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__1__DISABLE_SERVER_SIDE_CURSORS
        value: 'true'

      # gunicorn tuning
      - name: AUTHENTIK_WEB__WORKERS
        value: '4'
      - name: AUTHENTIK_WEB__THREADS
        value: '4'

  worker:
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    resources:
      requests:
        cpu: 0.5
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi

    livenessProbe:
      timeoutSeconds: 10
    readinessProbe:
      timeoutSeconds: 10
    startupProbe:
      timeoutSeconds: 10

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 60s
        labels:
          release: kube-prometheus-stack

    env:
      - name: AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS
        value: 10.244.0.0/16

      - name: AUTHENTIK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-secret-key
            key: secret-key

      # primary — rw pooler
      - name: AUTHENTIK_POSTGRESQL__HOST
        value: authentik-pooler-rw.authentik.svc.cluster.local

      - name: AUTHENTIK_POSTGRESQL__USER
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: user

      - name: AUTHENTIK_POSTGRESQL__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: password

      - name: AUTHENTIK_POSTGRESQL__NAME
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: dbname

      - name: AUTHENTIK_POSTGRESQL__CONN_MAX_AGE
        value: '0'

      - name: AUTHENTIK_POSTGRESQL__DISABLE_SERVER_SIDE_CURSORS
        value: 'true'

      # read replica 0 — ro pooler
      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__HOST
        value: authentik-pooler-ro.authentik.svc.cluster.local

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__USER
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: user

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: password

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__NAME
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: dbname

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__CONN_MAX_AGE
        value: '0'

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__DISABLE_SERVER_SIDE_CURSORS
        value: 'true'

      # read replica 1 — rw pooler (primary also handles reads)
      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__1__HOST
        value: authentik-pooler-rw.authentik.svc.cluster.local

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__1__USER
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: user

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__1__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: password

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__1__NAME
        valueFrom:
          secretKeyRef:
            name: authentik-database-app
            key: dbname

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__1__CONN_MAX_AGE
        value: '0'

      - name: AUTHENTIK_POSTGRESQL__READ_REPLICAS__1__DISABLE_SERVER_SIDE_CURSORS
        value: 'true'

      # worker tuning
      - name: AUTHENTIK_WORKER__PROCESSES
        value: '1'

      - name: AUTHENTIK_WORKER__THREADS
        value: '4'
