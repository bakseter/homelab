ollama:
  ollama:
    mountPath: /data/ollama

    models:
      pull:
        - gemma3:1b
        - gemma3:4b
        - gemma4:e2b

  image:
    repository: ollama/ollama
    tag: 0.20.7@sha256:487324a9312240e3e122446f351b1f1e3f68d884ef854c246db2e08792440d94

  extraEnv:
    - name: HOME
      value: /data/ollama
    - name: OLLAMA_MODELS
      value: /data/ollama/models
    - name: OLLAMA_NUM_PARALLEL
      value: '1'
    - name: OLLAMA_MAX_LOADED_MODELS
      value: '1'
    - name: GOMLOCKALL
      value: '1'

  persistentVolume:
    enabled: true
    size: 30Gi

  resources:
    requests:
      cpu: 2
      memory: 6Gi
    limits:
      cpu: 4
      memory: 12Gi

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    supplementalGroups:
      - 65534
    seccompProfile:
      type: RuntimeDefault
