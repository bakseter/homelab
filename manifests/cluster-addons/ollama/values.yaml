ollama:
  ollama:
    mountPath: /data/ollama

    models:
      pull:
        - gemma3:1b
        - gemma3:4b
        - gemma4:e2b
        - gemma4:e4b

  image:
    repository: ollama/ollama
    tag: 0.23.2@sha256:d00473cb58f0082c07cd6ed0d326a8a86f443ab69c51f8fc2b1a41687d45c661

  extraEnv:
    - name: HOME
      value: /data/ollama
    - name: OLLAMA_MODELS
      value: /data/ollama/models
    - name: OLLAMA_NUM_PARALLEL
      value: '1'
    - name: OLLAMA_MAX_LOADED_MODELS
      value: '1'
    - name: GOMLOCKALL
      value: '1'

  persistentVolume:
    enabled: true
    size: 30Gi

  resources:
    requests:
      cpu: 2
      memory: 6Gi
    limits:
      cpu: 5
      memory: 12Gi

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    supplementalGroups:
      - 65534
    seccompProfile:
      type: RuntimeDefault
