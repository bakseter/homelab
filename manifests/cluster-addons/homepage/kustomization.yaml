apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: homepage

resources:
  - serviceaccount.yaml
  - secret.yaml
  - configmap.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - service.yaml
  - deployment.yaml
  - httproute.yaml
  - sealedsecret.yaml
  - ciliumnetworkpolicy.yaml
