apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  kubernetes.yaml: |
    mode: cluster

  settings.yaml: |
    title: Homelab
    description: Homelab dashboard
    theme: dark
    color: slate
    headerStyle: clean
    statusStyle: dot
    hideVersion: true
    disableUpdateCheck: true
    disableIndexing: true
    fullWidth: false
    useEqualHeights: true
    iconStyle: theme
    target: _blank

    background:
      blur: sm
      saturate: 50
      brightness: 25
      opacity: 30

    cardBlur: md

    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      showSearchSuggestions: true
      provider: duckduckgo

    providers:
      longhorn:
        url: http://longhorn-frontend.longhorn-system.svc.cluster.local

    layout:
      Home:
        style: row
        columns: 4
        icon: mdi-home-outline
      Media:
        style: row
        columns: 5
        icon: mdi-play-box-multiple-outline
      Downloads:
        style: row
        columns: 4
        icon: mdi-download-circle-outline
      Core:
        style: row
        columns: 3
        icon: mdi-cube-scan
      Monitoring:
        style: row
        columns: 3
        icon: mdi-chart-areaspline

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: homelab
        nodes:
          show: false
    - longhorn:
        expanded: false
        total: true
        labels: false
        nodes: false
    - search:
        provider: duckduckgo
        target: _blank
        focus: false

  services.yaml: |
    - Media:
        - Jellyfin:
            href: https://jellyfin.bakseter.net
            description: Media server
            icon: jellyfin.svg
            namespace: media
            app: jellyfin
            widget:
              type: jellyfin
              url: http://jellyfin.media.svc.cluster.local:8096
              key: {{HOMEPAGE_VAR_JELLYFIN_TOKEN}}
              enableBlocks: true
              enableNowPlaying: true

        - Seerr:
            href: https://seerr.bakseter.net
            description: Request management
            icon: seerr.svg
            namespace: media
            app: seerr
            widget:
              type: seerr
              url: http://seerr.media.svc.cluster.local
              key: {{HOMEPAGE_VAR_SEERR_TOKEN}}

        - Immich:
            href: https://immich.bakseter.net
            description: Photos
            icon: immich.svg
            namespace: immich
            app: immich-server
            podSelector: >-
              app.kubernetes.io/name=server
            widget:
              type: immich
              url: http://immich-server.immich.svc.cluster.local:2283
              key: {{HOMEPAGE_VAR_IMMICH_TOKEN}}
              version: 2

        - Audiobookshelf:
            href: https://podcasts.bakseter.net
            description: Podcasts
            icon: audiobookshelf.svg
            namespace: media
            app: audiobookshelf
            widget:
              type: audiobookshelf
              url: http://audiobookshelf.media.svc.cluster.local
              key: {{HOMEPAGE_VAR_AUDIOBOOKSHELF_TOKEN}}

    - Home:
        - Amex:
            href: https://amex.bakseter.net
            description: Amex invoice processing
            icon: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/fa/American_Express_logo_%282018%29.svg/250px-American_Express_logo_%282018%29.svg.png'
            namespace: amex
            app: amex-frontend
            podSelector: >-
              app=amex-frontend

        - Mandagsmiddag:
            href: https://mandagsmiddag.no
            description: Dinner on a monday
            icon: https://mandagsmiddag.no/icon.png
            namespace: mandagsmiddag
            app: mandagsmiddag-frontend

        - bakseter.no:
            href: https://bakseter.no
            description: Personal homepage
            icon: https://bakseter.no/favicon.ico
            namespace: bakseter-no
            app: web
            podSelector: >-
              app=web

        - Vaultwarden:
            href: https://vaultwarden.bakseter.net
            description: Password manager
            icon: vaultwarden.svg
            namespace: vaultwarden
            app: vaultwarden

    - Downloads:
        - Sonarr:
            href: https://sonarr.bakseter.net
            description: TV series
            icon: sonarr.svg
            namespace: media
            app: sonarr
            widget:
              type: sonarr
              url: http://sonarr.media.svc.cluster.local:8989
              key: {{HOMEPAGE_VAR_SONARR_TOKEN}}

        - Radarr:
            href: https://radarr.bakseter.net
            description: Movies
            icon: radarr.svg
            namespace: media
            app: radarr
            widget:
              type: radarr
              url: http://radarr.media.svc.cluster.local:7878
              key: {{HOMEPAGE_VAR_RADARR_TOKEN}}

        - Lidarr:
            href: https://lidarr.bakseter.net
            description: Music
            icon: lidarr.svg
            namespace: media
            app: lidarr
            widget:
              type: lidarr
              url: http://lidarr.media.svc.cluster.local:8686
              key: {{HOMEPAGE_VAR_LIDARR_TOKEN}}

        - Prowlarr:
            href: https://prowlarr.bakseter.net
            description: Indexer manager
            icon: prowlarr.svg
            namespace: media
            app: prowlarr
            widget:
              type: prowlarr
              url: http://prowlarr.media.svc.cluster.local:9696
              key: {{HOMEPAGE_VAR_PROWLARR_TOKEN}}

        - SABnzbd:
            href: https://sabnzbd.bakseter.net
            description: Usenet downloader
            icon: sabnzbd.svg
            namespace: media
            app: sabnzbd
            widget:
              type: sabnzbd
              url: http://sabnzbd.media.svc.cluster.local:8080
              key: {{HOMEPAGE_VAR_SABNZBD_TOKEN}}

    - Core:
        - Argo CD:
            href: https://argocd.sre.bakseter.net
            description: GitOps
            icon: argocd.svg
            namespace: argocd
            app: argocd-server

        - Authentik:
            href: https://authentik.bakseter.no
            description: Identity provider
            icon: authentik.svg
            namespace: authentik
            app: authentik
            podSelector: >-
              app.kubernetes.io/component=server

        - Longhorn:
            href: https://longhorn.int.bakseter.net
            description: Block storage
            icon: longhorn.svg
            namespace: longhorn-system
            app: longhorn-ui
            podSelector: >-
              app=longhorn-ui

        - Technitium:
            href: https://technitium.int.bakseter.net
            description: DNS server
            icon: technitium.svg
            namespace: technitium
            app: technitium

        - RustFS:
            href: https://rustfs.int.bakseter.net
            description: S3 storage
            icon: rustfs.svg
            namespace: monitoring
            app: loki-rustfs
            podSelector: >-
              app.kubernetes.io/name=rustfs

    - Monitoring:
        - Grafana:
            href: https://grafana.sre.bakseter.net
            description: Dashboards
            icon: grafana.svg
            namespace: monitoring
            app: grafana
            podSelector: >-
              app=grafana

        - Prometheus:
            href: https://prometheus.int.bakseter.net
            description: Metrics
            icon: prometheus.svg
            namespace: monitoring
            app: prometheus
            widget:
              type: prometheus
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090

        - Alertmanager:
            href: https://alertmanager.int.bakseter.net
            description: Alerts
            icon: alertmanager.svg
            namespace: monitoring
            app: alertmanager

  custom.css: |
    /* Tighten up card padding slightly */
    .service-card {
      padding: 0.6rem 0.75rem;
    }

    /* Slightly more breathing room between tab buttons */
    .tab-button {
      letter-spacing: 0.04em;
    }

  custom.js: ''
  docker.yaml: ''
  proxmox.yaml: ''
  bookmarks.yaml: ''
