apiVersion: policies.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: require-cpu-memory-requests-limits
spec:
  validationActions:
    - Audit
  evaluation:
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        object.spec.containers.all(c,
          c.?resources.?requests.?cpu.hasValue() &&
          c.?resources.?requests.?memory.hasValue() &&
          c.?resources.?limits.?cpu.hasValue() &&
          c.?resources.?limits.?memory.hasValue()
        )
      message: "All containers must define resources.requests.cpu, resources.requests.memory, resources.limits.cpu, and resources.limits.memory."
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(c,
          c.?resources.?requests.?cpu.hasValue() &&
          c.?resources.?requests.?memory.hasValue() &&
          c.?resources.?limits.?cpu.hasValue() &&
          c.?resources.?limits.?memory.hasValue()
        )
      message: "All initContainers must define resources.requests.cpu, resources.requests.memory, resources.limits.cpu, and resources.limits.memory."
