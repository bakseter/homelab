apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: technitium
  namespace: technitium
spec:
  serviceName: technitium
  replicas: 3
  revisionHistoryLimit: 5
  template:
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: technitium
              topologyKey: bakseter.net/physical-node
      containers:
        - name: technitium
          image: technitium/dns-server:15.4.0@sha256:df7d90ef0f7b6fff6916d291a7022cd902290cc31c3141d4158b6c375a641b41
          ports:
            - name: console-http
              containerPort: 5380
              protocol: TCP
            - name: console-https
              containerPort: 53443
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          env:
            - name: DNS_SERVER_LOG_MAX_LOG_FILE_DAYS
              value: '1'
            - name: DNS_SERVER_BLOCK_LIST_URLS
              value: 'https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/pro-onlydomains.txt'
            - name: DNS_SERVER_FORWARDERS
              value: '1.1.1.1,8.8.8.8'
            - name: DNS_SERVER_ENABLE_BLOCKING
              value: 'true'
          envFrom:
            - secretRef:
                name: technitium
          readinessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 30
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /etc/dns
            - name: logs
              mountPath: /var/log/technitium/dns
            - name: tmp
              mountPath: /tmp
        - name: log-collector
          image: busybox:stable@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command:
            ['/bin/sh', '-c', 'tail -n+1 -F /var/log/technitium/dns/*.log']
          volumeMounts:
            - name: logs
              mountPath: /var/log/technitium/dns
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add: [NET_BIND_SERVICE]
            readOnlyRootFilesystem: true
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: config
      spec:
        accessModes: ['ReadWriteOnce']
        resources:
          requests:
            storage: 1Gi
