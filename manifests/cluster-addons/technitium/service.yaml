apiVersion: v1
kind: Service
metadata:
  name: technitium
  namespace: technitium
spec:
  clusterIP: None
  ports:
    - name: cluster-tcp
      port: 53443
      targetPort: 53443
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: http-web
      port: 5380
      targetPort: 5380
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: technitium-primary
spec:
  type: ClusterIP
  selector:
    statefulset.kubernetes.io/pod-name: technitium-0
  ports:
    - name: cluster-tcp
      port: 53443
      targetPort: 53443
      protocol: TCP
