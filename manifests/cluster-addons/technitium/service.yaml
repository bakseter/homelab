apiVersion: v1
kind: Service
metadata:
  name: technitium
  namespace: technitium
spec:
  ports:
    - name: http-ui
      port: 5380
      targetPort: 5380
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
