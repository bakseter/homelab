apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sabnzbd
  namespace: media
  labels:
    app.kubernetes.io/name: sabnzbd
spec:
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - backend:
              service:
                name: sabnzbd
                port:
                  number: 8080
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - sabnzbd
