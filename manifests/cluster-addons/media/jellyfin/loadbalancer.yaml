apiVersion: v1
kind: Service
metadata:
  name: jellyfin-lan
  namespace: media
  labels:
    app.kubernetes.io/instance: jellyfin
    app.kubernetes.io/name: jellyfin
    l2-announce: 'true'
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/instance: jellyfin
    app.kubernetes.io/name: jellyfin
  ports:
    - name: http
      port: 8096
      protocol: TCP
      targetPort: http
