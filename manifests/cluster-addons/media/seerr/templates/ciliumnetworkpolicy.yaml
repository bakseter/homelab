apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: seerr
  namespace: media
  annotations:
    gethomepage.dev/enabled: 'true'
    gethomepage.dev/description: Media requests
    gethomepage.dev/group: Media
    gethomepage.dev/icon: seerr.png
    gethomepage.dev/name: Seerr
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: seerr

  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
            app.kubernetes.io/name: envoy
            gateway.envoyproxy.io/owning-gateway-name: tailscale-home
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus-blackbox-exporter
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: homepage
            app.kubernetes.io/name: homepage
      toPorts:
        - ports:
            - port: '5055'
              protocol: TCP

    # TODO: find way to further restrict this
    # For LAN loadbalancer
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: '5055'
              protocol: TCP

  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: ANY
          rules:
            dns:
              - matchPattern: '*'

    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: jellyfin
      toPorts:
        - ports:
            - port: '8096'
              protocol: TCP

    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: radarr
      toPorts:
        - ports:
            - port: '7878'
              protocol: TCP

    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: sonarr
      toPorts:
        - ports:
            - port: '8989'
              protocol: TCP

    - toFQDNs:
        - matchName: 'api.themoviedb.org'
        - matchName: 'api.github.com'
        - matchName: 'gravatar.com'
        - matchPattern: '*.algolia.net'
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP
