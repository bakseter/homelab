apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-dns
  namespace: external-dns
spec:
  endpointSelector: {}

  ingress: []

  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: ANY
          rules:
            dns:
              - matchPattern: 'technitium-primary.technitium.svc.cluster.local'

    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: technitium
            app.kubernetes.io/name: technitium
      toPorts:
        - ports:
            - port: '53'
              protocol: ANY


    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: '6443'
              protocol: TCP

    - toCIDR:
        - 192.168.60.200/32 # pihole
      toPorts:
        - ports:
            - port: '8080'
              protocol: TCP
