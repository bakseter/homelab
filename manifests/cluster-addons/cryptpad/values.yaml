cryptpad:
  podSecurityContext:
    fsGroup: 4001 # default
    runAsGroup: 4001
    runAsUser: 4001
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  config:
    httpUnsafeOrigin: https://cryptpad.bakseter.net
    httpSafeOrigin: https://cryptpad.bakseter.net
