apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cryptpad
  namespace: cryptpad
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: home-bakseter-net
      namespace: tailscale

  hostnames:
    - cryptpad.bakseter.net

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''
          kind: Service
          name: cryptpad
          port: 80
