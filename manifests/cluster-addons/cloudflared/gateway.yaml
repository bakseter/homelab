apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cloudflared-gateway
  namespace: cloudflared
spec:
  gatewayClassName: envoy
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: cloudflared-proxy
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - authentik
                  - bakseter-net
                  - mandagsmiddag
