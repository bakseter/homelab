apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  allowCrossNamespaceImport: true
  title: cloudflared
  instanceSelector:
    matchLabels:
      dashboards: grafana
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  allowCrossNamespaceImport: true
  folder: cloudflared
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "title": "Cloudflared tunnel",
      "panels": [
        {
          "type": "stat", "title": "Total requests",
          "datasource": "prometheus",
          "targets": [{"expr": "sum(cloudflared_tunnel_total_requests{}) by (job)", "legendFormat": "requests", "datasource": "prometheus"}],
          "gridPos": {"x":0,"y":0,"w":6,"h":4}
        },
        {
          "type": "stat", "title": "Proxy errors",
          "datasource": "prometheus",
          "targets": [{"expr": "sum(cloudflared_tunnel_request_errors{}) by (job)", "legendFormat": "errors", "datasource": "prometheus"}],
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color":"green","value":0},{"color":"red","value":1}]}}},
          "gridPos": {"x":6,"y":0,"w":6,"h":4}
        },
        {
          "type": "stat", "title": "HA connections",
          "datasource": "prometheus",
          "targets": [{"expr": "sum(cloudflared_tunnel_ha_connections{}) by (job)", "datasource": "prometheus"}],
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color":"red","value":0},{"color":"yellow","value":2},{"color":"green","value":4}]}}},
          "gridPos": {"x":12,"y":0,"w":6,"h":4}
        },
        {
          "type": "stat", "title": "Active requests",
          "datasource": "prometheus",
          "targets": [{"expr": "sum(cloudflared_tunnel_concurrent_requests_per_tunnel{}) by (job)", "datasource": "prometheus"}],
          "gridPos": {"x":18,"y":0,"w":6,"h":4}
        },
        {
          "type": "timeseries", "title": "Request rate",
          "datasource": "prometheus",
          "targets": [{"expr": "sum(rate(cloudflared_tunnel_total_requests[10m])) by (job)", "legendFormat": "req/s", "datasource": "prometheus"}],
          "gridPos": {"x":0,"y":4,"w":12,"h":8}
        },
        {
          "type": "timeseries", "title": "Responses by status code",
          "datasource": "prometheus",
          "targets": [{"expr": "sum(increase(cloudflared_tunnel_response_by_code[10m])) by (job)", "legendFormat": "{{status_code}}", "datasource": "prometheus"}],
          "gridPos": {"x":12,"y":4,"w":12,"h":8}
        },
        {
          "type": "timeseries", "title": "4xx + 5xx error rate",
          "datasource": "prometheus",
          "targets": [
            {"expr": "sum(rate(cloudflared_tunnel_response_by_code{status_code=~\"4..\"}[10m])) by (job)", "legendFormat": "4xx", "datasource": "prometheus"},
            {"expr": "sum(rate(cloudflared_tunnel_response_by_code{status_code=~\"5..\"}[10m])) by (job)", "legendFormat": "5xx", "datasource": "prometheus"},
            {"expr": "sum(rate(cloudflared_tunnel_request_errors[10m]))", "legendFormat": "proxy errors", "datasource": "prometheus"}
          ],
          "gridPos": {"x":0,"y":12,"w":24,"h":8}
        },
        {
          "type": "timeseries", "title": "QUIC RTT per connection (ms)",
          "datasource": "prometheus",
          "targets": [
            {"expr": "sum(quic_client_latest_rtt{}) by (job)", "legendFormat": "conn {{conn_index}}", "datasource": "prometheus"},
            {"expr": "sum(quic_client_smoothed_rtt{}) by (job)", "legendFormat": "smoothed {{conn_index}}", "datasource": "prometheus"}
          ],
          "gridPos": {"x":0,"y":20,"w":12,"h":8}
        },
        {
          "type": "stat", "title": "Tunnel server locations",
          "datasource": "prometheus",
          "targets": [{"expr": "sum(cloudflared_tunnel_server_locations{}) by (connection_id, edge_location) == 1", "legendFormat": "{{connection_id}} → {{edge_location}}", "datasource": "prometheus"}],
          "gridPos": {"x":12,"y":20,"w":12,"h":8}
        }
      ]
    }
