apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  endpointSelector: {}

  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - rules:
            http:
              - path: '/metrics'
                method: 'GET'
          ports:
            - port: '2000'
              protocol: TCP

  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: ANY
          rules:
            dns:
              - matchPattern: '*'

    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
            app.kubernetes.io/name: envoy
            gateway.envoyproxy.io/owning-gateway-name: cloudflared
      toPorts:
        - ports:
            - port: '10080'
              protocol: TCP

    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: alloy
      toPorts:
        - ports:
            - port: '4318'
              protocol: TCP

    - toFQDNs:
        - matchPattern: '*.v2.argotunnel.com'
      toPorts:
        - ports:
            - port: '7844'
              protocol: ANY # NOTE: could maybe be 'UDP'?

    - toFQDNs:
        - matchPattern: '*.v2.argotunnel.com'
      icmps:
        - fields:
            - type: '8'

    - toFQDNs:
        - matchName: 'api.cloudflare.com'
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP
