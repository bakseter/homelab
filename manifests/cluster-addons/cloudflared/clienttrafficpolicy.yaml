apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: trust-pod-cidr
  namespace: cloudflared
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cloudflared-gateway
  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 1
