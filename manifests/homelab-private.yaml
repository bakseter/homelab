apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-private
  namespace: argocd
spec:
  project: default
  destination:
    namespace: argocd
    name: admin@homelab
  source:
    path: manifests
    repoURL: https://github.com/bakseter/homelab-private.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
