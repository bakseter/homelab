name: Build images

on:
  push:
    branches: [master]
    paths:
      - 'images/**'
  pull_request:
    branches: [master]
    paths:
      - 'images/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    env:
      IMAGE_NAME_PREFIX: 'ghcr.io/${{ github.repository }}'
    strategy:
      matrix:
        images:
          - goauthentik/server:2026.5.4
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: 'ghcr.io'
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Get Dockerfile path and image name
        id: get-env
        run: | 
          echo "dockerfile=$(echo $MATRIX_IMAGE | sed -e 's/\//+/g')" >> "$GITHUB_OUTPUT"
          echo "image-name-with-tag=$IMAGE_NAME_PREFIX/$MATRIX_IMAGE" >> "$GITHUB_OUTPUT"
        env:
         MATRIX_IMAGE: ${{ matrix.image }}

      - name: Build image with cache and push to registry
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          file: ${{ steps.get-env.outputs.dockerfile }}
          push: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }} 
          tags: ${{ steps.get-env.outputs.image-name-with-tag }}
